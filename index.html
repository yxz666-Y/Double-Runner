<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;overflow:hidden}
canvas{display:block;border:1px solid #333}
#hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
#hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
#p1{color:#5bf}#p2{color:#fb5}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;background:rgba(0,0,0,0.8);padding:16px 32px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;text-align:center}
</style>
</head>
<body>
<div id="hud">
  <span id="p1">P1: A/D 移动 | W 二段跳</span>
  <span id="p2">P2: ↑ 跳 | ↓ 射击 | ←→ 冲刺</span>
  <span>❤️ x<b id="lives">3</b></span>
  <span>🪙 <b id="coins">0</b></span>
  <span>👤 P1+P2</span>
  <span id="level-tag" style="color:#fd0">第 1 关</span>
</div>
<canvas id="game"></canvas>
<div id="msg"></div>
<script>
/* ============================================
 * 常量 —— 调参区
 * ============================================ */
const CANVAS_W = 800, CANVAS_H = 500;       // 画布
const GRAVITY      = 0.55;   // 重力加速度（px/frame²）
const JUMP_V       = -9.0;   // 一段跳初速度
const DOUBLE_JUMP_V= -7.5;   // 二段跳初速度
const MOVE_SPEED   = 3.5;    // 水平移速（px/frame）
const DASH_SPEED   = 9;      // 冲刺速度
const DASH_DURATION= 8;      // 冲刺持续帧数
const DASH_COOLDOWN= 60;     // 冲刺冷却帧数
const DJ_WINDOW    = 30;     // 二段跳时间窗（帧数，约500ms@60fps）
const DASH_WINDOW  = 15;     // 冲刺就绪窗（P1按A/D后P2有15帧时间按箭头）
const GROUND_Y     = 430;    // 地面 y 坐标
const CHAR_W = 28, CHAR_H = 38; // 角色尺寸
const MONSTER_W = 32, MONSTER_H = 28;        // 怪兽尺寸
const ENEMY_BULLET_SPEED = 4.0;              // 怪兽弹幕速度
const MONSTER_DMG = 1;                       // 怪兽碰撞伤害（扣心数）
const BULLET_SPEED = 8;                      // 玩家子弹速度

/* ============================================
 * 画布
 * ============================================ */
const canvas = document.getElementById('game');
canvas.width = CANVAS_W; canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

/* ============================================
 * 游戏状态
 * ============================================ */
let player = { x:60, y:GROUND_Y-CHAR_H-10, w:CHAR_W, h:CHAR_H, vx:0, vy:0, onGround:false, jumpsUsed:0, maxJumps:2 };
let cameraX = 0;
let lives = 3, coinsCollected = 0, deaths = 0;
let gameState = 'menu'; // menu | playing | win | gameover
let deadTimer = 0, winTimer = 0;
let particles = [];

// 冲刺 & 二段跳状态
let dashTimer = 0;           // 冲刺剩余帧数（>0=冲刺中）
let dashCooldown = 0;        // 冲刺冷却剩余帧数
let dashDir = 0;             // 冲刺方向：-1左 1右
let dashReadyL = 0;          // 左冲刺就绪窗（P1按A后倒计时，>0期间P2可按←触发）
let dashReadyR = 0;          // 右冲刺就绪窗
let invincibleTimer = 0;     // 无敌帧剩余
let djWindow = 0;            // 二段跳时间窗剩余帧数（P2跳跃后开启）
let p2JumpHeld = false;      // P2是否正在按住跳跃键（防连跳）

/* ============================================
 * 关卡数据 —— 多关卡并存
 * ============================================ */
const LEVELS = {
  1: {
    name: '第一关 · 教学', width: 1500,
    grounds: [{x:0,y:GROUND_Y,w:600,h:70},{x:760,y:GROUND_Y,w:740,h:70}],
    platforms: [{x:620,y:380,w:160,h:16}],
    spikes: [{x:400,y:GROUND_Y-20,w:40,h:20}],
    coins: [{x:200,y:380},{x:230,y:380},{x:680,y:360},{x:710,y:360},{x:900,y:380},{x:930,y:380}],
    flag: {x:1420,y:GROUND_Y-80,w:10,h:80},
  },
  2: {
    name: '第二关 · 挑战', width: 2200,
    grounds: [{x:0,y:GROUND_Y,w:700,h:70},{x:820,y:GROUND_Y,w:480,h:70},{x:1500,y:GROUND_Y,w:400,h:70},{x:1980,y:GROUND_Y,w:220,h:70}],
    platforms: [{x:700,y:380,w:140,h:16},{x:920,y:360,w:100,h:16},{x:1050,y:290,w:80,h:16},{x:1380,y:360,w:80,h:16},{x:1700,y:380,w:100,h:16}],
    spikes: [{x:400,y:GROUND_Y-20,w:40,h:20},{x:1750,y:GROUND_Y-20,w:40,h:20}],
    coins: [{x:200,y:380},{x:230,y:380},{x:740,y:360},{x:770,y:360},{x:950,y:330},{x:980,y:330},{x:1070,y:270},{x:1090,y:270},{x:1400,y:340},{x:1420,y:340},{x:1620,y:380},{x:1650,y:380},{x:1730,y:360},{x:2020,y:380},{x:2050,y:380},{x:2080,y:380}],
    flag: {x:2120,y:GROUND_Y-80,w:10,h:80},
  },
  3: {
    name: '第三关 · 极限', width: 3000,
    grounds: [{x:0,y:GROUND_Y,w:600,h:70},{x:760,y:GROUND_Y,w:380,h:70},{x:1280,y:GROUND_Y,w:360,h:70},{x:1780,y:GROUND_Y,w:320,h:70},{x:2240,y:GROUND_Y,w:760,h:70}],
    platforms: [{x:620,y:380,w:140,h:16},{x:850,y:340,w:100,h:16},{x:1130,y:380,w:150,h:16},{x:1280,y:250,w:120,h:16},{x:1430,y:360,w:100,h:16},{x:1620,y:380,w:160,h:16},{x:1820,y:260,w:100,h:16},{x:2700,y:340,w:120,h:16}],
    spikes: [{x:400,y:GROUND_Y-20,w:40,h:20},{x:1950,y:GROUND_Y-20,w:40,h:20},{x:2500,y:GROUND_Y-20,w:40,h:20}],
    coins: [{x:200,y:380},{x:230,y:380},{x:680,y:360},{x:710,y:360},{x:870,y:200},{x:900,y:200},{x:1180,y:360},{x:1210,y:360},{x:1300,y:230},{x:1320,y:230},{x:1390,y:230},{x:1460,y:340},{x:1490,y:340},{x:1680,y:360},{x:1710,y:360},{x:1840,y:240},{x:1870,y:240},{x:2350,y:380},{x:2380,y:380},{x:2810,y:320},{x:2840,y:320},{x:2870,y:320}],
    flag: {x:2920,y:GROUND_Y-80,w:10,h:80},
  },
  4: {
    name: '第四关 · 猎魔', width: 3300,
    monsters: [{x:800,y:GROUND_Y-MONSTER_H},{x:2400,y:GROUND_Y-MONSTER_H}],
    grounds: [{x:0,y:GROUND_Y,w:600,h:70},{x:760,y:GROUND_Y,w:380,h:70},{x:1280,y:GROUND_Y,w:360,h:70},{x:1780,y:GROUND_Y,w:320,h:70},{x:2240,y:GROUND_Y,w:1060,h:70}],
    platforms: [{x:620,y:380,w:160,h:16},{x:830,y:340,w:180,h:16},{x:1130,y:380,w:150,h:16},{x:1260,y:250,w:200,h:16},{x:1450,y:360,w:120,h:16},{x:1620,y:380,w:160,h:16},{x:1810,y:260,w:160,h:16},{x:2680,y:340,w:220,h:16}],
    spikes: [{x:400,y:GROUND_Y-20,w:40,h:20},{x:1950,y:GROUND_Y-20,w:40,h:20},{x:2500,y:GROUND_Y-20,w:40,h:20}],
    coins: [{x:160,y:380},{x:200,y:380},{x:160,y:350},{x:200,y:350},{x:680,y:360},{x:710,y:360},{x:880,y:200},{x:910,y:200},{x:1180,y:360},{x:1210,y:360},{x:1300,y:230},{x:1320,y:230},{x:1410,y:230},{x:1490,y:340},{x:1520,y:340},{x:1680,y:360},{x:1710,y:360},{x:1840,y:240},{x:1870,y:240},{x:2350,y:380},{x:2380,y:380},{x:2810,y:320},{x:2840,y:320},{x:2870,y:320}],
    flag: {x:3220,y:GROUND_Y-80,w:10,h:80},
  },
  5: {
    name: '第五关 · 攻防战', width: 3400,
    monsters: [{x:1080,y:GROUND_Y-MONSTER_H},{x:1520,y:GROUND_Y-MONSTER_H},{x:2720,y:GROUND_Y-MONSTER_H}],
    grounds: [{x:0,y:GROUND_Y,w:580,h:70},{x:760,y:GROUND_Y,w:400,h:70},{x:1300,y:GROUND_Y,w:360,h:70},{x:1800,y:GROUND_Y,w:320,h:70},{x:2260,y:GROUND_Y,w:1140,h:70}],
    platforms: [{x:620,y:380,w:160,h:16},{x:850,y:340,w:180,h:16},{x:1150,y:380,w:150,h:16},{x:1280,y:250,w:200,h:16},{x:1470,y:360,w:120,h:16},{x:1640,y:380,w:160,h:16},{x:1820,y:260,w:160,h:16}],
    spikes: [{x:400,y:GROUND_Y-20,w:40,h:20},{x:1950,y:GROUND_Y-20,w:40,h:20},{x:2500,y:GROUND_Y-20,w:40,h:20}],
    coins: [{x:160,y:380},{x:200,y:380},{x:680,y:360},{x:710,y:360},{x:880,y:200},{x:910,y:200},{x:1180,y:360},{x:1210,y:360},{x:1300,y:230},{x:1320,y:230},{x:1500,y:340},{x:1530,y:340},{x:1680,y:360},{x:1710,y:360},{x:1840,y:240},{x:1870,y:240},{x:2350,y:380},{x:2380,y:380},{x:2810,y:320},{x:2840,y:320},{x:2870,y:320}],
    flag: {x:3320,y:GROUND_Y-80,w:10,h:80},
  },
};

const totalLevels = Object.keys(LEVELS).length;

// 运行时关卡数据（由 loadLevel 填充）
let LEVEL_W = 1500;
let GROUNDS = [], PLATFORMS = [], SPIKES = [], COINS = [], MONSTERS = [];
let FLAG = {x:0,y:0,w:0,h:0};
let currentLevel = 1;
let menuSelection = 1;
let levelTimer = 0;
let finalScore = 0;
let monsterKills = 0;
let highScores = {};
// 加载最高分
try { highScores = JSON.parse(localStorage.getItem('duoRunnerHighScores')) || {}; } catch(e) {}

function loadLevel(id) {
  const lv = LEVELS[id]; if (!lv) return;
  document.getElementById('msg').style.opacity = '0'; // 清除旧消息
  GROUNDS = lv.grounds.map(o => ({...o, type:'ground'}));
  PLATFORMS = lv.platforms.map(o => ({...o, type:'platform'}));
  SPIKES = lv.spikes.map(o => ({...o}));
  COINS = lv.coins.map(o => ({...o}));
  MONSTERS = (lv.monsters || []).map(o => ({...o, alive:true, squashT:0, dir:-1, attackCD:180+Math.floor(Math.random()*80)}));
  FLAG = {...lv.flag};
  LEVEL_W = lv.width;
  currentLevel = id;
  const tag = document.getElementById('level-tag');
  if (tag) tag.textContent = '第 ' + id + ' 关';
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
  cameraX = 0; lives = 3; coinsCollected = 0; deaths = 0; levelTimer = 0; monsterKills = 0;
  gameState = 'playing';
}

/* ============================================
 * 输入
 * ============================================ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
  // 菜单控制：数字键或方向键选关
  if (gameState === 'menu') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') { loadLevel(1); return; }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { loadLevel(2); return; }
    if (e.code === 'Digit3' || e.code === 'Numpad3') { loadLevel(3); return; }
    if (e.code === 'Digit4' || e.code === 'Numpad4') { loadLevel(4); return; }
    if (e.code === 'Digit5' || e.code === 'Numpad5') { loadLevel(5); return; }
    if (e.code === 'ArrowUp') { menuSelection = menuSelection>1 ? menuSelection-1 : totalLevels; return; }
    if (e.code === 'ArrowDown') { menuSelection = menuSelection<totalLevels ? menuSelection+1 : 1; return; }
    if (e.code === 'Enter' || e.code === 'Space') { loadLevel(menuSelection); return; }
  }
  // 胜利菜单控制
  if (gameState === 'win') {
    if (e.code === 'Enter' || e.code === 'Space') {
      if (currentLevel < Object.keys(LEVELS).length) { loadLevel(currentLevel+1); return; }
    }
    if (e.code === 'Backspace') { gameState = 'menu'; document.getElementById('msg').style.opacity = '0'; return; }
  }
  if (e.code === 'KeyR' && (gameState === 'dead' || gameState === 'gameover')) resetLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

/* ============================================
 * 碰撞检测
 * ============================================ */
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function collectCoin(coin) {
  const idx = COINS.indexOf(coin);
  if (idx >= 0) { COINS.splice(idx,1); coinsCollected++; }
}

/* ============================================
 * 粒子
 * ============================================ */
function spawnParticles(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:30+Math.random()*30, size:2+Math.random()*3, color});
  }
}

/* ============================================
 * 更新
 * ============================================ */
function update() {
  try {
  if (gameState === 'playing') levelTimer++;
  if (gameState === 'menu') {
    if (keys['Enter']) { gameState = 'playing'; keys['Enter'] = false; }
    return;
  }
  if (gameState === 'win') { winTimer++; if (winTimer>300) { gameState='menu'; document.getElementById('msg').style.opacity='0'; } return; }
  if (gameState === 'gameover') return;

  /* ==========================================
   * 操作处理
   * ========================================== */

  // === P1: A/D 水平移动 ===
  const p1Left = keys['KeyA'], p1Right = keys['KeyD'];
  if (dashTimer <= 0) {
    const airControl = player.onGround ? 1 : 0.5; // 空中操控减半
    player.vx = 0;
    if (p1Left)  player.vx = -MOVE_SPEED * airControl;
    if (p1Right) player.vx = MOVE_SPEED * airControl;
  }

  /* === P2: ↑ 跳跃（仅地面） === */
  if (keys['ArrowUp'] && player.onGround && !p2JumpHeld) {
    player.vy = JUMP_V;
    player.onGround = false;
    player.jumpsUsed = 1;
    djWindow = DJ_WINDOW;  // 开启二段跳时间窗
    p2JumpHeld = true;
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#5bf', 10);
  }
  if (!keys['ArrowUp']) p2JumpHeld = false;

  /* === 二段跳：P2起跳后时间窗内 P1按W === */
  if (djWindow > 0) djWindow--;
  if (keys['KeyW'] && !player.onGround && djWindow > 0 && player.jumpsUsed < player.maxJumps) {
    keys['KeyW'] = false;
    player.vy = DOUBLE_JUMP_V;
    player.jumpsUsed++;
    djWindow = 0;
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fff', 20);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fd0', 16);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#8cf', 12);
  }

  /* === 冲刺：P1按A/D开启就绪窗 → P2在窗内按同方向箭头触发 === */
  // 就绪窗倒计时
  if (dashReadyL > 0) dashReadyL--;
  if (dashReadyR > 0) dashReadyR--;

  // P1按下A或D时开启对应就绪窗
  if (p1Left  && !keys._prevKeyA) dashReadyL = DASH_WINDOW;
  if (p1Right && !keys._prevKeyD) dashReadyR = DASH_WINDOW;
  keys._prevKeyA = p1Left;
  keys._prevKeyD = p1Right;

  if (dashTimer > 0) {
    dashTimer--;
    player.vx = dashDir * DASH_SPEED;
    invincibleTimer = 3;
  } else if (dashCooldown > 0) {
    dashCooldown--;
  } else {
    // 就绪窗内+P2按同方向箭头 → 触发冲刺
    const dashL = keys['ArrowLeft']  && dashReadyL > 0 && !keys._prevArrowLeft;
    const dashR = keys['ArrowRight'] && dashReadyR > 0 && !keys._prevArrowRight;
    // 同时保留原始同步检测（两人刚好同时按下）
    const syncL = keys['ArrowLeft']  && p1Left  && !keys._prevArrowLeft;
    const syncR = keys['ArrowRight'] && p1Right && !keys._prevArrowRight;
    if (dashL || syncL) {
      dashTimer = DASH_DURATION; dashDir = -1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyL = 0;
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
    }
    if (dashR || syncR) {
      dashTimer = DASH_DURATION; dashDir = 1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyR = 0;
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 8);
    }
  }
  keys._prevArrowLeft  = keys['ArrowLeft'];
  keys._prevArrowRight = keys['ArrowRight'];

  /* === P2: ↓ 射击 === */
  if (keys['ArrowDown'] && !keys._shotFired) {
    keys._shotFired = true;
    const bulletDir = player.dir || 1;
    const bx = player.x + CHAR_W/2 + bulletDir*10;
    const by = player.y + CHAR_H/2;
    particles.push({x:bx, y:by, vx:bulletDir*BULLET_SPEED, vy:0, life:60, size:4, color:'#ff0', isPlayerBullet:true, isBullet:true});
  }
  if (!keys['ArrowDown']) keys._shotFired = false;

  /* === 无敌帧倒计时 === */
  if (invincibleTimer > 0) invincibleTimer--;

  /* ---- 物理 ---- */
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  // 边界
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - CHAR_W) player.x = LEVEL_W - CHAR_W;

  /* ---- 碰撞 ---- */
  const prevBottom = player.y + CHAR_H - player.vy;
  const pcx = player.x + CHAR_W / 2;
  const halfW = CHAR_W * 0.4; // 判定宽度：中心±40%，大半悬空即掉落
  player.onGround = false;
  const allSolids = [...GROUNDS, ...PLATFORMS];
  for (const s of allSolids) {
    if (pcx + halfW <= s.x || pcx - halfW >= s.x + s.w) continue;
    if (player.y+CHAR_H <= s.y || player.y >= s.y+s.h) continue;

    if (player.vy >= 0) { // 下落
      // 只有脚之前在上面才站上去（防侧面吸上去）
      if (prevBottom > s.y + s.h) continue;
      player.y = s.y - CHAR_H;
      player.vy = 0;
      player.onGround = true;
      player.jumpsUsed = 0;
    } else { // 上升→撞头
      player.y = s.y + s.h;
      player.vy = 0;
    }
  }

  // X轴碰撞（不和地面做X碰撞，只和墙壁/平台侧面）
  for (const s of PLATFORMS) {
    if (player.y+CHAR_H <= s.y+4 || player.y >= s.y+s.h-4) continue; // Y轴未对齐
    if (player.x+CHAR_W <= s.x || player.x >= s.x+s.w) continue;
    if (player.vx > 0) player.x = s.x - CHAR_W;
    else if (player.vx < 0) player.x = s.x + s.w;
  }

  /* ---- 记录安全位置 ---- */
  if (player.onGround) { lastSafeX = player.x; lastSafeY = player.y; }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    if (pcx + 6 > s.x && pcx - 6 < s.x + s.w &&
        player.y + CHAR_H > s.y && player.y < s.y + s.h &&
        invincibleTimer <= 0) {
      die(false);
      break;
    }
  }

  /* ---- 掉出屏幕 ---- */
  if (player.y > CANVAS_H + 80 && invincibleTimer <= 0) die(true);

  /* ---- 金币 ---- */
  for (let i = COINS.length-1; i >= 0; i--) {
    const c = COINS[i];
    const cr = {x:c.x-8, y:c.y-8, w:16, h:16};
    if (rectCollide(player, cr)) { COINS.splice(i,1); coinsCollected++; }
  }

  /* ---- 终点旗帜 ---- */
  if (rectCollide(player, FLAG)) {
    gameState = 'win';
    winTimer = 0;
    const seconds = Math.floor(levelTimer / 60);
    const timeBonus = Math.max(0, 500 - seconds * 5);
    const coinBonus = coinsCollected * 50;
    const deathPenalty = deaths * 200;
    const killBonus = monsterKills * 300;
    finalScore = 1000 + timeBonus + coinBonus + killBonus - deathPenalty;
    if (finalScore < 0) finalScore = 0;
    // 更新最高分
    const prev = highScores[currentLevel] || 0;
    if (finalScore > prev) { highScores[currentLevel] = finalScore; localStorage.setItem('duoRunnerHighScores', JSON.stringify(highScores)); }
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    showMsg('🎉 通关！ 得分: '+finalScore+'\n⏱ '+seconds+'s  🪙 '+coinsCollected+'  👾 '+monsterKills+'  💀 '+deaths+
      '\n'+(hasNext?'Enter 下一关  ·  Backspace 回菜单':'Backspace 回菜单'), false);
  }

  /* ---- 相机 ---- */
  cameraX = player.x - CANVAS_W/3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_W - CANVAS_W) cameraX = LEVEL_W - CANVAS_W;

  /* ---- 子弹命中怪兽 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isPlayerBullet) continue;
    for (const m of MONSTERS) {
      if (!m.alive) continue;
      if (b.x > m.x && b.x < m.x+MONSTER_W && b.y > m.y && b.y < m.y+MONSTER_H) {
        m.alive = false; m.squashT = 40;
        particles.splice(i,1);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#7c3aed', 14);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#fff', 6);
        break;
      }
    }
  }

  /* ---- 怪物更新（平台巡逻） ---- */
  for (const m of MONSTERS) {
    if (!m.alive) { if (m.squashT > 0) m.squashT--; continue; }
    // 初始化：找到怪物脚下的平台，设置巡逻边界
    if (!m._init) { m._init = true; m.patrolDir = 1;
      for (const g of [...GROUNDS, ...PLATFORMS]) {
        if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
            m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) {
          m.patrolL = g.x + 8; m.patrolR = g.x+g.w - MONSTER_W - 8; break;
        }
      }
      if (!m.patrolL) { m.patrolL = m.x - 60; m.patrolR = m.x + 60; }
    }
    // 巡逻移动
    m.x += m.patrolDir * 1.5; m.dir = m.patrolDir;
    // 到达边界→转向
    if (m.x <= m.patrolL || m.x >= m.patrolR) m.patrolDir *= -1;
    // 确保脚在平台上（边缘检测兜底）
    let onPlat = false;
    for (const g of [...GROUNDS, ...PLATFORMS]) {
      if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
          m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) { onPlat = true; break; }
    }
    if (!onPlat) m.patrolDir *= -1;

    // 攻击CD（发现玩家在视野内时射击）
    const dx = player.x - m.x;
    m.attackCD--;
    if (m.attackCD <= 0 && Math.abs(dx) < 400) {
      m.attackCD = 180 + Math.floor(Math.random()*80);
      const bDir = dx > 0 ? 1 : -1;
      particles.push({x:m.x+MONSTER_W/2, y:m.y+MONSTER_H/2, vx:bDir*ENEMY_BULLET_SPEED, vy:0, life:120, size:5, color:'#f44', isBullet:true});
    }
    // 碰撞玩家
    if (player.x+CHAR_W > m.x && player.x < m.x+MONSTER_W &&
        player.y+CHAR_H > m.y && player.y < m.y+MONSTER_H && invincibleTimer <= 0) {
      die(false);
    }
  }

  /* ---- 弹幕碰撞玩家（仅敌方子弹） ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isBullet || b.isPlayerBullet) continue;
    if (player.x+CHAR_W > b.x-4 && player.x < b.x+4 &&
        player.y+CHAR_H > b.y-4 && player.y < b.y+4 && invincibleTimer <= 0) {
      particles.splice(i,1);
      die(false);
    }
  }

  /* ---- 粒子 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (!p.isBullet && !p.isPlayerBullet) p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  /* ---- HUD ---- */
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coinsCollected;
  } catch(e) { window._err = e.message; gameState = 'menu'; }
}

let lastSafeX = 60, lastSafeY = GROUND_Y - CHAR_H - 10;

function die(fromFall) {
  if (gameState !== 'playing') return;
  lives--; deaths++;
  spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#f44', 30);
  document.getElementById('lives').textContent = lives;

  if (lives <= 0) {
    gameState = 'gameover';
    showMsg('💀 生命耗尽！游戏重新开始...', false);
    setTimeout(() => location.reload(), 2000);
  } else {
    // 原地复活 或 悬崖边复活
    if (fromFall) {
      player.x = lastSafeX;
      player.y = lastSafeY;
    } else {
      player.y = lastSafeY;
    }
    player.vy = 0; player.vx = 0;
    player.jumpsUsed = 0;
    invincibleTimer = 120;
    gameState = 'playing';
    document.getElementById('msg').style.opacity = '1';
    document.getElementById('msg').innerHTML = '💔 -1';
    setTimeout(() => { document.getElementById('msg').style.opacity = '0'; }, 800);
  }
}

function resetLevel() {
  lives = 3; coinsCollected = 0; deaths = 0;
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0;
  gameState = 'playing';
  // 重置金币（简单重载）
  location.reload();
}

/* ============================================
 * 渲染
 * ============================================ */
function draw() {
  ctx.globalAlpha = 1; // 每帧强制重置，防闪现
  // 通关画面
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#fd0'; ctx.font = 'bold 40px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 完美配合！', CANVAS_W/2, 180);
    ctx.fillText('通关成功！', CANVAS_W/2, 230);
    ctx.fillStyle = '#fff'; ctx.font = '16px -apple-system';
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    ctx.fillText(hasNext ? 'Enter 下一关  ·  Backspace 回菜单' : 'Backspace 回菜单', CANVAS_W/2, 290);
    ctx.fillText('或等待5秒自动返回', CANVAS_W/2, 320);
    ctx.textAlign = 'left';
    return;
  }
  // 开始菜单（含选关）
  if (gameState === 'menu') {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.textAlign = 'center';
    // 计算总高度，居中分布
    const rowH = 38, listW = 400;
    const totalH = 70 + 20 + rowH*totalLevels + 30; // 标题+间距+列表+底部
    const topOffset = (CANVAS_H - totalH) / 2;
    // 标题
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px -apple-system';
    ctx.fillText('双人跑酷', CANVAS_W/2, topOffset+36);
    ctx.font = '12px -apple-system'; ctx.fillStyle = '#888';
    ctx.fillText('P1: A/D移动+W二段跳  |  P2: ↑跳 ↓射击 ←→冲刺', CANVAS_W/2, topOffset+60);
    // 关卡列表
    const startY = topOffset + 90;
    for (let i=1; i<=totalLevels; i++) {
      const y = startY + (i-1)*rowH;
      const sel = i===menuSelection;
      if (sel) { ctx.fillStyle = 'rgba(255,200,0,0.12)'; ctx.fillRect(CANVAS_W/2-listW/2, y-15, listW, 30); }
      ctx.font = sel?'bold 16px -apple-system':'14px -apple-system';
      ctx.fillStyle = sel?'#fd0':'#aaa';
      const hs = highScores[i]||0;
      ctx.fillText((sel?'▶ ':'  ')+'第'+i+'关  '+LEVELS[i].name+(hs?'  最高'+hs:'  无记录'), CANVAS_W/2, y);
    }
    ctx.font = '13px -apple-system'; ctx.fillStyle = '#ff0';
    ctx.fillText('↑↓ 选择  ·  Enter 进入  ·  1-'+totalLevels+' 快速选关', CANVAS_W/2, startY+totalLevels*rowH+30);
    if (window._err) { ctx.fillStyle='#f44'; ctx.font='12px monospace'; ctx.fillText('错误: '+window._err, CANVAS_W/2, startY+totalLevels*rowH+50); }
    ctx.textAlign = 'left'; return;
  }

  ctx.save();
  ctx.translate(-cameraX, 0);

  /* ---- 天空 ---- */
  ctx.fillStyle = '#5c94fc'; ctx.fillRect(cameraX, 0, CANVAS_W, CANVAS_H);
  // 像素云
  ctx.fillStyle = '#ffffff';
  for (let cx = (cameraX-cameraX%200)-100; cx < cameraX+CANVAS_W+200; cx += 200) {
    const cy = 40 + ((cx*7)%60);
    ctx.fillRect(cx,cy,40,16); ctx.fillRect(cx+12,cy-10,56,20); ctx.fillRect(cx+24,cy-16,32,16);
    ctx.fillRect(cx+44,cy-6,28,14);
  }
  // 远山
  for (let hx = (cameraX-cameraX%160)-80; hx < cameraX+CANVAS_W+160; hx += 160) {
    ctx.fillStyle = '#68b838';
    ctx.beginPath(); ctx.moveTo(hx-30,GROUND_Y); ctx.lineTo(hx+20,GROUND_Y-60); ctx.lineTo(hx+80,GROUND_Y); ctx.fill();
    ctx.fillStyle = '#58a828';
    ctx.beginPath(); ctx.moveTo(hx+10,GROUND_Y); ctx.lineTo(hx+50,GROUND_Y-40); ctx.lineTo(hx+70,GROUND_Y); ctx.fill();
  }

  /* ---- 地面（像素砖块） ---- */
  const brkColors = ['#c84c30','#b84028','#a83820'];
  for (const g of GROUNDS) {
    // 泥土
    ctx.fillStyle = '#c84c30'; ctx.fillRect(g.x, g.y, g.w, g.h);
    // 砖块纹理
    for (let bx=g.x; bx<g.x+g.w; bx+=32) {
      for (let by=g.y; by<g.y+g.h; by+=16) {
        const ci = ((bx/32)+(by/16))%3;
        ctx.fillStyle = brkColors[ci];
        ctx.fillRect(bx, by, 31, 15);
        ctx.fillStyle = '#d46040'; ctx.fillRect(bx, by, 31, 3);
        ctx.fillStyle = '#903020'; ctx.fillRect(bx, by+12, 31, 3);
      }
    }
    // 草地顶部
    ctx.fillStyle = '#38b838'; ctx.fillRect(g.x, g.y, g.w, 10);
    ctx.fillStyle = '#48d848'; ctx.fillRect(g.x, g.y, g.w, 4);
    // 草地纹理
    for (let gx=g.x; gx<g.x+g.w; gx+=8) {
      ctx.fillStyle = (Math.floor(gx/8)%2)?'#48d040':'#38b030';
      ctx.fillRect(gx+1, g.y+6, 6, 2);
    }
  }

  /* ---- 平台（像素砖块） ---- */
  for (const p of PLATFORMS) {
    for (let bx=p.x; bx<p.x+p.w; bx+=16) {
      ctx.fillStyle = (Math.floor(bx/16)%2)?'#c84c30':'#d86040';
      ctx.fillRect(bx, p.y, 15, p.h);
      ctx.fillStyle = '#e87850'; ctx.fillRect(bx, p.y, 15, 3);
      ctx.fillStyle = '#903020'; ctx.fillRect(bx, p.y+p.h-3, 15, 3);
      // 砖缝
      ctx.fillStyle = '#1a0808'; ctx.fillRect(bx-1, p.y, 1, p.h); ctx.fillRect(bx-1, p.y+p.h/2, 15, 1);
    }
  }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    for (let sx = s.x; sx < s.x+s.w; sx += 12) {
      ctx.fillStyle = '#e83030';
      ctx.beginPath(); ctx.moveTo(sx, s.y+s.h); ctx.lineTo(sx+6, s.y); ctx.lineTo(sx+12, s.y+s.h); ctx.fill();
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.moveTo(sx+2, s.y+s.h); ctx.lineTo(sx+6, s.y+2); ctx.lineTo(sx+10, s.y+s.h); ctx.fill();
    }
  }

  /* ---- 金币 ---- */
  for (const c of COINS) {
    const bob = Math.sin(Date.now()/300 + c.x) * 2;
    const w = Math.abs(Math.cos(Date.now()/400 + c.x)) * 10 + 4; // 旋转宽度变化
    const cx = c.x, cy = c.y + bob;
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-w/2, cy-5, w, 10);
    ctx.fillStyle = '#ff8'; ctx.fillRect(cx-w/2+2, cy-3, w-4, 6);
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-3, cy-3, 6, 6); ctx.fillStyle = '#ff8'; ctx.fillRect(cx-2, cy-2, 4, 4);
  }

  /* ---- 终点旗杆 ---- */
  const flagWave = Math.sin(Date.now()/400)*4;
  ctx.fillStyle = '#888'; ctx.fillRect(FLAG.x+4, FLAG.y, 4, FLAG.h);
  ctx.fillStyle = '#48c848'; ctx.fillRect(FLAG.x-2, FLAG.y+4+flagWave, 32, 18);
  ctx.fillStyle = '#fff'; ctx.fillRect(FLAG.x+2, FLAG.y+8+flagWave, 16, 8);
  ctx.fillStyle = '#fd0'; ctx.beginPath(); ctx.arc(FLAG.x+6, FLAG.y, 8, 0, Math.PI*2); ctx.fill();

  /* ---- 怪物 ---- */
  for (const m of MONSTERS) {
    if (!m.alive && m.squashT <= 0) continue;
    const mx=m.x, my=m.y, alpha = m.alive?1:0.5;
    ctx.globalAlpha = alpha;
    // 身体
    ctx.fillStyle = '#7c3aed'; ctx.fillRect(mx+2, my+6, MONSTER_W-4, MONSTER_H-8);
    ctx.fillStyle = '#a78bfa'; ctx.fillRect(mx+4, my+8, MONSTER_W-8, 6);
    // 眼睛
    ctx.fillStyle = '#fff'; ctx.fillRect(mx+6, my+10, 6, 6); ctx.fillRect(mx+MONSTER_W-12, my+10, 6, 6);
    ctx.fillStyle = '#000'; ctx.fillRect(m.dir>0?mx+8:mx+6, my+12, 3, 3); ctx.fillRect(m.dir>0?mx+MONSTER_W-10:mx+MONSTER_W-12, my+12, 3, 3);
    // 脚
    ctx.fillStyle = '#5b21b6'; ctx.fillRect(mx+4, my+MONSTER_H-6, 8, 6); ctx.fillRect(mx+MONSTER_W-12, my+MONSTER_H-6, 8, 6);
    ctx.globalAlpha = 1;
  }

  /* ---- 冲刺残影 ---- */
  if (dashTimer > 0) {
    for (let i=1; i<=3; i++) {
      const ax = player.x - dashDir * i * 12;
      const alpha = 1 - i*0.3;
      ctx.globalAlpha = alpha * 0.4;
      ctx.fillStyle = '#fff'; ctx.fillRect(ax+2, player.y+10, CHAR_W-4, CHAR_H-12);
    }
    ctx.globalAlpha = 1;
  }

  /* ---- 角色 ---- */
  const showChar = gameState !== 'gameover';
  if (invincibleTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(invincibleTimer * 0.5) * 0.2;
  }
  if (showChar) {
    const p = player;
    // 方向：根据vx或冲刺方向
    const dir = dashTimer>0 ? dashDir : (p.vx!==0 ? (p.vx>0?1:-1) : (p.dir||1));
    p.dir = dir;
    const flipX = dir < 0;
    function d(x,y,w,h){ // 像素矩形（支持翻转）
      const sx = flipX ? p.x+CHAR_W-(x-p.x)-w : x;
      ctx.fillRect(sx, y, w, h);
    }
    const px=p.x, py=p.y;
    const inAir = !p.onGround;

    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(px+4, py+CHAR_H-2, 20, 4);

    // 帽子（红色）
    ctx.fillStyle = dashTimer>0?'#ff8888':'#e83030';
    d(px+4, py-3, 20, 8);
    d(px+2, py+2, 26, 5);

    // 脸
    ctx.fillStyle = '#ffe8c0';
    d(px+4, py+5, 20, 12);

    // 眼睛（面朝方向）
    ctx.fillStyle = '#000';
    if (dir>0) { ctx.fillRect(px+18, py+8, 4, 4); }
    else { ctx.fillRect(px+6, py+8, 4, 4); }

    // 胡子
    ctx.fillStyle = '#8b5a2b';
    d(px+4, py+14, 8, 4); d(px+16, py+14, 8, 4);

    // 身体（红色衬衫）
    ctx.fillStyle = '#e83030';
    d(px+4, py+17, 20, 6);

    // 跳跃姿势：手臂上举
    if (inAir) {
      ctx.fillStyle = '#ffe8c0';
      d(px+2, py+12, 6, 8); d(px+20, py+12, 6, 8); // 手臂
      // 腿分开
      ctx.fillStyle = '#3858e8';
      d(px+2, py+29, 8, 6); d(px+18, py+29, 8, 6);
      ctx.fillStyle = '#6b3020';
      d(px, py+34, 10, 4); d(px+18, py+34, 10, 4);
    } else {
      // 站立/行走：手臂自然下垂
      ctx.fillStyle = '#ffe8c0';
      d(px+4, py+16, 5, 6); d(px+19, py+16, 5, 6);
      // 腿
      ctx.fillStyle = '#3858e8';
      d(px+4, py+29, 8, 6); d(px+16, py+29, 8, 6);
      ctx.fillStyle = '#6b3020';
      d(px+2, py+34, 10, 4); d(px+16, py+34, 10, 4);
    }

    // 蓝色背带裤
    ctx.fillStyle = '#3858e8';
    d(px+4, py+23, 20, 6);
    ctx.fillStyle = '#3858e8';
    d(px+6, py+17, 4, 12); d(px+18, py+17, 4, 12);

    // 冲刺速度线
    if (dashTimer > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (let i=0; i<3; i++) {
        ctx.fillRect(flipX?px-10:px+CHAR_W, py+14+i*8, 10, 3);
      }
    }
    if (!p.onGround && p.jumpsUsed >= 1) {
      ctx.fillStyle = 'rgba(100,180,255,0.25)';
      ctx.beginPath(); ctx.arc(p.x+CHAR_W/2, p.y+CHAR_H, 20, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  /* ---- 粒子 ---- */
  for (const p of particles) {
    const alpha = Math.min(1, p.life/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const s = p.size || 3;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

}

/* ============================================
 * 消息
 * ============================================ */
let msgTimeout;
function showMsg(text, autoHide=true) {
  const el = document.getElementById('msg');
  el.innerHTML = text.replace(/\n/g, '<br>');
  el.style.opacity = '1';
  if (autoHide) { clearTimeout(msgTimeout); msgTimeout = setTimeout(() => el.style.opacity = '0', 2000); }
}

/* ============================================
 * 循环
 * ============================================ */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
