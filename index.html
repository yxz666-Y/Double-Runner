<!DOCTYPE html>

<title>双人跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;overflow:hidden}
canvas{display:block;border:1px solid #333}
#hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
#hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
#p1{color:#5bf}#p2{color:#fb5}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;background:rgba(0,0,0,0.8);padding:16px 32px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;text-align:center}
/* HUD 默认隐藏，游戏中才显示 */
#hud{display:none}
body.playing #hud, body.dead #hud, body.win #hud, body.gameover #hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
body.playing #hud span, body.dead #hud span, body.win #hud span, body.gameover #hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
/* 按键提示栏 */
#hud-keys{display:none;gap:14px;color:#fff;font-size:12px;margin:4px 0 6px 0;align-items:center}
body.playing #hud-keys, body.dead #hud-keys, body.win #hud-keys, body.gameover #hud-keys{display:flex}
#hud-keys .kp{background:rgba(0,0,0,0.55);padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
#hud-keys .kp b{display:inline-block;background:#222;border:1px solid #555;border-bottom-width:2px;border-radius:4px;padding:1px 6px;margin:0 1px;font-size:11px;line-height:1;min-width:14px;text-align:center;color:#fff;transition:all 0.08s}
#hud-keys .kp-p1 b{border-color:#5bf;color:#5bf;box-shadow:0 0 0 rgba(91,187,255,0)}
#hud-keys .kp-p2 b{border-color:#fb5;color:#fb5;box-shadow:0 0 0 rgba(255,187,85,0)}
#hud-keys .kp-esc b{border-color:#fd0;color:#fd0;box-shadow:0 0 0 rgba(255,221,0,0)}
/* 按键按下时高亮（JS 会动态加 .on 类） */
#hud-keys .kp b.on{background:currentColor;color:#000;border-color:#fff;transform:translateY(1px)}
#hud-keys .kp-p1 .on{background:#5bf}
#hud-keys .kp-p2 .on{background:#fb5}
#hud-keys .kp-esc .on{background:#fd0}
/* 设置面板遮罩 */
#settings-panel{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:20;cursor:pointer}
body.settings #settings-panel{display:flex}
#settings-panel .box{background:rgba(20,20,30,0.95);border:2px solid #fd0;border-radius:14px;padding:28px 40px;min-width:360px;text-align:center;box-shadow:0 0 30px rgba(255,200,0,0.3)}
#settings-panel h2{color:#fd0;font-size:28px;margin:0 0 18px 0;font-family:-apple-system,sans-serif}
#settings-panel .opt{display:block;width:100%;margin:8px 0;padding:14px 0;font-size:20px;color:#fff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-family:-apple-system,sans-serif;transition:all 0.15s}
#settings-panel .opt:hover, #settings-panel .opt.sel{background:rgba(255,200,0,0.25);border-color:#fd0;color:#fd0;transform:scale(1.03)}
#settings-panel .hint{margin-top:14px;font-size:13px;color:#888;font-family:-apple-system,sans-serif}

  ArrowDown:  '.kp-p2 b:nth-child(3)',
  ArrowRight: '.kp-p2 b:nth-child(4)',
  Escape:     '.kp-esc b',
};

  const sel = KEY_HUD_MAP[code]; if (!sel) return;
  const el = document.querySelector('#hud-keys ' + sel);

// ═══ 音效系统（Web Audio API 合成） ═══
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type='sine', vol=1) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol * sfxVolume * 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

// 各种音效
function sfxJump()    { playTone(520, 0.12, 'square', 1); setTimeout(()=>playTone(680,0.1,'square',0.7),60); }

function sfxCoin()    { playTone(880, 0.08, 'sine', 1); setTimeout(()=>playTone(1200,0.1,'sine',0.8),80); }
function sfxDie()     { playTone(400, 0.15, 'sawtooth', 0.8); setTimeout(()=>playTone(200,0.2,'sawtooth',0.6),120); }
function sfxWin()     { [0,100,200,300].forEach((d,i)=>setTimeout(()=>playTone(660+i*110,0.2,'sine',1),d)); }
function sfxShoot()   { playTone(800, 0.05, 'square', 0.4); playTone(1200, 0.04, 'sawtooth', 0.3); }
function sfxBump()    { playTone(180, 0.08, 'square', 0.5); }
function sfxPause()   { playTone(440, 0.06, 'sine', 0.6); setTimeout(()=>playTone(330,0.06,'sine',0.5),80); }

    // 备用：用户首次点击时再尝试播放（浏览器自动播放策略）
    document.addEventListener('click', function playOnce() {
      bgmAudio.play().catch(()=>{});
      document.removeEventListener('click', playOnce);
    }, {once:true});
  });
}
function updateBGMVolume() {
  if (bgmAudio) bgmAudio.volume = musicVolume * 0.3;
}
function stopBGM() {
  if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }

let highScores = {};
// 加载最高分
try { highScores = JSON.parse(localStorage.getItem('duoRunnerHighScores')) || {}; } catch(e) {}

function loadLevel(id) {
  const lv = LEVELS[id]; if (!lv) return;
  document.getElementById('msg').style.opacity = '0'; // 清除旧消息
  GROUNDS = lv.grounds.map(o => ({x:o.x-8, y:o.y, w:o.w+16, h:o.h, type:'ground'})); // 碰撞区扩8px防边缘漏缝
  PLATFORMS = lv.platforms.map(o => ({...o, type:'platform'}));
  SPIKES = lv.spikes.map(o => ({...o}));
  COINS = lv.coins.map(o => ({...o}));
  MONSTERS = (lv.monsters || []).map(o => ({...o, alive:true, squashT:0, dir:-1, attackCD:180+Math.floor(Math.random()*80)}));
  FLAG = {...lv.flag};
  LEVEL_W = lv.width;
  currentLevel = id;
  const tag = document.getElementById('level-tag');
  if (tag) tag.textContent = '第 ' + id + ' 关';
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
  cameraX = 0; lives = 3; coinsCollected = 0; deaths = 0; levelTimer = 0; monsterKills = 0;
  gameState = 'playing';
  setBodyState();
}

/* ============================================
 * 输入
 * ============================================ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
  syncKeyHud(e.code, true);
  // 首次按键时初始化音频 + 启动 BGM
  initAudio();

  // === ESC 打开/关闭设置面板 ===
  if (e.code === 'Escape') {
    if (gameState === 'settings') {
      closeSettings(); // 关闭 → 回到原状态
    } else if (gameState === 'playing' || gameState === 'dead' || gameState === 'win') {
      openSettings();  // 打开
    }
    return;
  }
  // === 设置面板内的导航 ===
  if (gameState === 'settings') {
    if (e.code === 'ArrowUp')   { settingsSelection = (settingsSelection + 2) % 3; updateSettingsSel(); return; }
    if (e.code === 'ArrowDown') { settingsSelection = (settingsSelection + 1) % 3; updateSettingsSel(); return; }
    if (e.code === 'Enter' || e.code === 'Space') { handleSettingsAct(settingsActs[settingsSelection]); return; }
    if (e.code === 'Digit1') { handleSettingsAct('resume'); return; }
    if (e.code === 'Digit2') { handleSettingsAct('restart'); return; }
    if (e.code === 'Digit3') { handleSettingsAct('menu'); return; }
    return; // 设置面板打开时其他键屏蔽
  }

  // 菜单控制：数字键或方向键选关
  if (gameState === 'menu') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') { loadLevel(1); return; }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { loadLevel(2); return; }
    if (e.code === 'Digit3' || e.code === 'Numpad3') { loadLevel(3); return; }
    if (e.code === 'Digit4' || e.code === 'Numpad4') { loadLevel(4); return; }
    if (e.code === 'Digit5' || e.code === 'Numpad5') { loadLevel(5); return; }
    if (e.code === 'ArrowUp') { menuSelection = menuSelection>1 ? menuSelection-1 : totalLevels; return; }
    if (e.code === 'ArrowDown') { menuSelection = menuSelection<totalLevels ? menuSelection+1 : 1; return; }
    if (e.code === 'Tab') { charSelect = charSelect===0?1:0; return; }
    if (e.code === 'Enter' || e.code === 'Space') { loadLevel(menuSelection); playBGM(); return; }
  }
  // 胜利菜单控制
  if (gameState === 'win') {
    if (e.code === 'Enter' || e.code === 'Space') {
      if (currentLevel < Object.keys(LEVELS).length) { loadLevel(currentLevel+1); return; }
    }
    if (e.code === 'Backspace') { gameState = 'menu'; setBodyState(); document.getElementById('msg').style.opacity = '0'; return; }
  }
  if (e.code === 'KeyR' && (gameState === 'dead' || gameState === 'gameover')) resetLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); syncKeyHud(e.code, false); });

/* ============================================
 * 设置面板
 * ============================================ */
const settingsActs = ['resume', 'restart', 'menu'];
function openSettings() {
  prevGameState = gameState;
  gameState = 'settings';
  settingsSelection = 0;
  setBodyState();
  // 清除可能残留的内联 display 样式，让 CSS class 生效
  const panel = document.getElementById('settings-panel');
  if (panel) panel.style.display = '';
  updateSettingsSel();
}
function closeSettings() {
  // 默认回到打开设置前的状态
  gameState = prevGameState || 'playing';
  prevGameState = '';
  setBodyState();
  // 清除可能残留的内联 display 样式，让 CSS class 生效
  const panel = document.getElementById('settings-panel');
  if (panel) panel.style.display = '';
  document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
}
function handleSettingsAct(act) {
  if (act === 'resume') {
    closeSettings();
  } else if (act === 'restart') {
    // 重新开始本关：完全重置
    gameState = 'playing'; // 临时先切走，避免 loadLevel 内的死路
    prevGameState = '';
    setBodyState();
    const panel = document.getElementById('settings-panel');
    if (panel) panel.style.display = '';
    document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
    resetLevel();
  } else if (act === 'menu') {
    // 回到主页菜单
    gameState = 'menu';
    prevGameState = '';
    setBodyState();
    // 清理内联 display，让 CSS class 控制显隐
    const panel = document.getElementById('settings-panel');
    if (panel) panel.style.display = '';
    document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
    // 重置玩家到初始位置以免下次进游戏位置错乱
    player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
    player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
    // 重置安全位置/相机
    lastSafeX = 60; lastSafeY = GROUND_Y - CHAR_H - 10;
    cameraX = 0;
    // 清除残留子弹粒子
    particles = particles.filter(p => !p.isBullet && !p.isPlayerBullet);
    // 不重置关卡进度（用户可重新选关）
    document.getElementById('msg').style.opacity = '0';
    // 清除所有按键状态，防止菜单中按着的键影响下次进入游戏
    for (const k in keys) { if (keys[k]) syncKeyHud(k, false); keys[k] = false; }
  }
}
function updateSettingsSel() {
  const btns = document.querySelectorAll('#settings-panel .opt');
  btns.forEach((b, i) => b.classList.toggle('sel', i === settingsSelection));
}
// 绑定鼠标点击
document.querySelectorAll('#settings-panel .opt').forEach((btn, idx) => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    settingsSelection = idx;
    handleSettingsAct(btn.dataset.act);
  });
});

/* ============================================
 * 碰撞检测
 * ============================================ */
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function collectCoin(coin) {
  const idx = COINS.indexOf(coin);
  if (idx >= 0) { COINS.splice(idx,1); coinsCollected++; }
}

/* ============================================
 * 粒子
 * ============================================ */
function spawnParticles(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:30+Math.random()*30, size:2+Math.random()*3, color});
  }
}

/* ============================================
 * 更新
 * ============================================ */
function update() {
  try {
  // 设置面板打开时：完全暂停（不计时、不更新物理）
  if (gameState === 'settings') return;
  if (gameState === 'playing') levelTimer++;
  if (gameState === 'menu') {
    if (keys['Enter']) { gameState = 'playing'; keys['Enter'] = false; }
    return;
  }
  if (gameState === 'win') { winTimer++; if (winTimer>300) { gameState='menu'; document.getElementById('msg').style.opacity='0'; } return; }
  if (gameState === 'gameover') return;
  // 'dead' 状态：暂停 60 帧后自动复活到原位
  if (gameState === 'dead') {
    deadTimer--;
    if (deadTimer <= 0) {
      // 复活：玩家回到最近的安全位置
      player.x = lastSafeX;
      player.y = lastSafeY;
      player.vy = 0; player.vx = 0;
      player.jumpsUsed = 0;
      invincibleTimer = 90;
      gameState = 'playing';
      setBodyState();
      document.getElementById('msg').style.opacity = '0';
    }
    return;
  }

  /* ==========================================
   * 操作处理
   * ========================================== */

  // === P1: A/D 水平移动 ===
  const p1Left = keys['KeyA'], p1Right = keys['KeyD'];
  if (dashTimer <= 0) {
    const airControl = player.onGround ? 1 : 0.5; // 空中操控减半
    player.vx = 0;
    if (p1Left)  player.vx = -MOVE_SPEED * airControl;
    if (p1Right) player.vx = MOVE_SPEED * airControl;
  }

  /* === P2: ↑ 跳跃（仅地面） === */
  if (keys['ArrowUp'] && player.onGround && !p2JumpHeld) {
    player.vy = JUMP_V;
    player.onGround = false;
    player.jumpsUsed = 1;
    djWindow = DJ_WINDOW;
    p2JumpHeld = true;
    sfxJump();
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#5bf', 10);
  }
  if (!keys['ArrowUp']) p2JumpHeld = false;

  /* === 二段跳：P2起跳后时间窗内 P1按W === */
  if (djWindow > 0) djWindow--;
  if (keys['KeyW'] && !player.onGround && djWindow > 0 && player.jumpsUsed < player.maxJumps) {
    keys['KeyW'] = false;
    player.vy = DOUBLE_JUMP_V;
    player.jumpsUsed++;
    djWindow = 0;
    sfxJump();
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fff', 20);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fd0', 16);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#8cf', 12);
  }

  /* === 冲刺：P1按A/D开启就绪窗 → P2在窗内按同方向箭头触发 === */
  // 就绪窗倒计时
  if (dashReadyL > 0) dashReadyL--;
  if (dashReadyR > 0) dashReadyR--;

  // P1按下A或D时开启对应就绪窗
  if (p1Left  && !keys._prevKeyA) dashReadyL = DASH_WINDOW;
  if (p1Right && !keys._prevKeyD) dashReadyR = DASH_WINDOW;
  keys._prevKeyA = p1Left;
  keys._prevKeyD = p1Right;

  if (dashTimer > 0) {
    dashTimer--;
    player.vx = dashDir * DASH_SPEED;
    invincibleTimer = 3;
  } else if (dashCooldown > 0) {
    dashCooldown--;
  } else {
    // 就绪窗内+P2按同方向箭头 → 触发冲刺
    const dashL = keys['ArrowLeft']  && dashReadyL > 0 && !keys._prevArrowLeft;
    const dashR = keys['ArrowRight'] && dashReadyR > 0 && !keys._prevArrowRight;
    // 同时保留原始同步检测（两人刚好同时按下）
    const syncL = keys['ArrowLeft']  && p1Left  && !keys._prevArrowLeft;
    const syncR = keys['ArrowRight'] && p1Right && !keys._prevArrowRight;
    if (dashL || syncL) {
      dashTimer = DASH_DURATION; dashDir = -1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyL = 0;
      sfxDash();
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
    }
    if (dashR || syncR) {
      dashTimer = DASH_DURATION; dashDir = 1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyR = 0;
      sfxDash();
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 8);
    }
  }
  keys._prevArrowLeft  = keys['ArrowLeft'];
  keys._prevArrowRight = keys['ArrowRight'];

  /* === P2: ↓ 射击 === */
  if (keys['ArrowDown'] && !keys._shotFired) {
    keys._shotFired = true;
    const bulletDir = player.dir || 1;
    const bx = player.x + CHAR_W/2 + bulletDir*10;
    const by = player.y + CHAR_H/2;
    particles.push({x:bx, y:by, vx:bulletDir*BULLET_SPEED, vy:0, life:60, size:4, color:'#ff0', isPlayerBullet:true, isBullet:true});
    sfxShoot();
  }
  if (!keys['ArrowDown']) keys._shotFired = false;

  /* === 无敌帧倒计时 === */
  if (invincibleTimer > 0) invincibleTimer--;

  /* ---- 物理 ---- */
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  // 边界
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - CHAR_W) player.x = LEVEL_W - CHAR_W;

  /* ---- 碰撞 ---- */
  const prevBottom = player.y + CHAR_H - player.vy;
  const pcx = player.x + CHAR_W / 2;
  const halfW = CHAR_W * 0.4; // 判定宽度：中心±40%，大半悬空即掉落
  player.onGround = false;
  const allSolids = [...GROUNDS, ...PLATFORMS];
  for (const s of allSolids) {
    if (pcx + halfW <= s.x || pcx - halfW >= s.x + s.w) continue;
    if (player.y+CHAR_H <= s.y || player.y >= s.y+s.h) continue;

    if (player.vy >= 0) { // 下落
      // 只有脚之前在上面才站上去（防侧面吸上去）
      if (prevBottom > s.y + s.h) continue;
      player.y = s.y - CHAR_H;
      player.vy = 0;
      player.onGround = true;
      player.jumpsUsed = 0;
    } else { // 上升→撞头
      player.y = s.y + s.h;
      player.vy = 0;
    }
  }

  // X轴碰撞（不和地面做X碰撞，只和墙壁/平台侧面）
  for (const s of PLATFORMS) {
    if (player.y+CHAR_H <= s.y+4 || player.y >= s.y+s.h-4) continue; // Y轴未对齐
    if (player.x+CHAR_W <= s.x || player.x >= s.x+s.w) continue;
    if (player.vx > 0) player.x = s.x - CHAR_W;
    else if (player.vx < 0) player.x = s.x + s.w;
  }

  /* ---- 记录安全位置 ---- */
  if (player.onGround) { lastSafeX = player.x; lastSafeY = player.y; }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    if (pcx + 6 > s.x && pcx - 6 < s.x + s.w &&
        player.y + CHAR_H > s.y && player.y < s.y + s.h &&
        invincibleTimer <= 0) {
      die(false);
      break;
    }
  }

  /* ---- 掉出屏幕 ---- */
  if (player.y > CANVAS_H + 80 && invincibleTimer <= 0) die(true);

  /* ---- 金币 ---- */
  for (let i = COINS.length-1; i >= 0; i--) {
    const c = COINS[i];
    const cr = {x:c.x-8, y:c.y-8, w:16, h:16};
    if (rectCollide(player, cr)) { COINS.splice(i,1); coinsCollected++; sfxCoin(); }
  }

  /* ---- 终点旗帜 ---- */
  if (rectCollide(player, FLAG)) {
    gameState = 'win';
    setBodyState();
    winTimer = 0;
    sfxWin();
    const seconds = Math.floor(levelTimer / 60);
    const timeBonus = Math.max(0, 500 - seconds * 5);
    const coinBonus = coinsCollected * 50;
    const deathPenalty = deaths * 200;
    const killBonus = monsterKills * 300;
    finalScore = 1000 + timeBonus + coinBonus + killBonus - deathPenalty;
    if (finalScore < 0) finalScore = 0;
    // 更新最高分
    const prev = highScores[currentLevel] || 0;
    if (finalScore > prev) { highScores[currentLevel] = finalScore; localStorage.setItem('duoRunnerHighScores', JSON.stringify(highScores)); }
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    showMsg('🎉 通关！ 得分: '+finalScore+'\n⏱ '+seconds+'s  🪙 '+coinsCollected+'  👾 '+monsterKills+'  💀 '+deaths+
      '\n'+(hasNext?'Enter 下一关  ·  Backspace 回菜单':'Backspace 回菜单'), false);
  }

  /* ---- 相机 ---- */
  cameraX = player.x - CANVAS_W/3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_W - CANVAS_W) cameraX = LEVEL_W - CANVAS_W;

  /* ---- 子弹命中怪兽 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isPlayerBullet) continue;
    for (const m of MONSTERS) {
      if (!m.alive) continue;
      if (b.x > m.x && b.x < m.x+MONSTER_W && b.y > m.y && b.y < m.y+MONSTER_H) {
        m.alive = false; m.squashT = 40;
        particles.splice(i,1);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#7c3aed', 14);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#fff', 6);
        break;
      }
    }
  }

  /* ---- 怪物更新（平台巡逻） ---- */
  for (const m of MONSTERS) {
    if (!m.alive) { if (m.squashT > 0) m.squashT--; continue; }
    // 初始化：找到怪物脚下的平台，设置巡逻边界
    if (!m._init) { m._init = true; m.patrolDir = 1;
      for (const g of [...GROUNDS, ...PLATFORMS]) {
        if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
            m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) {
          m.patrolL = g.x + 8; m.patrolR = g.x+g.w - MONSTER_W - 8; break;
        }
      }
      if (!m.patrolL) { m.patrolL = m.x - 60; m.patrolR = m.x + 60; }
    }
    // 巡逻移动
    m.x += m.patrolDir * 1.5; m.dir = m.patrolDir;
    // 到达边界→转向
    if (m.x <= m.patrolL || m.x >= m.patrolR) m.patrolDir *= -1;
    // 确保脚在平台上（边缘检测兜底）
    let onPlat = false;
    for (const g of [...GROUNDS, ...PLATFORMS]) {
      if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
          m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) { onPlat = true; break; }
    }
    if (!onPlat) m.patrolDir *= -1;

    // 攻击CD（发现玩家在视野内时射击）
    const dx = player.x - m.x;
    m.attackCD--;
    if (m.attackCD <= 0 && Math.abs(dx) < 400) {
      m.attackCD = 180 + Math.floor(Math.random()*80);
      const bDir = dx > 0 ? 1 : -1;
      particles.push({x:m.x+MONSTER_W/2, y:m.y+MONSTER_H/2, vx:bDir*ENEMY_BULLET_SPEED, vy:0, life:120, size:5, color:'#f44', isBullet:true});
    }
    // 碰撞玩家
    if (player.x+CHAR_W > m.x && player.x < m.x+MONSTER_W &&
        player.y+CHAR_H > m.y && player.y < m.y+MONSTER_H && invincibleTimer <= 0) {
      die(false);
    }
  }

  /* ---- 弹幕碰撞玩家（仅敌方子弹） ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isBullet || b.isPlayerBullet) continue;
    if (player.x+CHAR_W > b.x-4 && player.x < b.x+4 &&
        player.y+CHAR_H > b.y-4 && player.y < b.y+4 && invincibleTimer <= 0) {
      particles.splice(i,1);
      die(false);
    }
  }

  /* ---- 粒子 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (!p.isBullet && !p.isPlayerBullet) p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  /* ---- HUD ---- */
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coinsCollected;
  } catch(e) { window._err = e.message; gameState = 'menu'; }
}

let lastSafeX = 60, lastSafeY = GROUND_Y - CHAR_H - 10;
let msgStayTimer = null;

function die(fromFall) {
  if (gameState !== 'playing') return;
  sfxDie();
  lives--; deaths++;
  spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#f44', 30);
  document.getElementById('lives').textContent = lives;

  if (lives <= 0) {
    // 生命耗尽：纯 JS 重置当前关卡（不 reload，避免 BGM/最高分被清）
    showMsg('💀 生命耗尽！\n按 R 重新开始本关', false);
    setTimeout(() => {
      if (gameState === 'gameover') resetLevel();
    }, 1200);
    gameState = 'gameover';
    setBodyState();
  } else {
    // 进入 'dead' 状态：暂停 60 帧（约 1 秒），期间玩家无敌
    // 此期间可以按 R 立即重置本关，否则自动复活继续
    player.vy = 0; player.vx = 0;
    player.jumpsUsed = 0;
    invincibleTimer = 120;
    gameState = 'dead';
    setBodyState();
    deadTimer = 60;
    document.getElementById('msg').style.opacity = '1';
    document.getElementById('msg').innerHTML = '💔 -1  ·  按 R 重置';
    msgStayTimer = setTimeout(() => {
      if (gameState === 'dead') document.getElementById('msg').style.opacity = '0';
    }, 1000);
  }
}

function resetLevel() {
  // 纯 JS 重置当前关卡（避免 location.reload 丢失 BGM/最高分）
  const lv = LEVELS[currentLevel]; if (!lv) return;
  document.getElementById('msg').style.opacity = '0';
  GROUNDS = lv.grounds.map(o => ({...o, type:'ground'}));
  PLATFORMS = lv.platforms.map(o => ({...o, type:'platform'}));
  SPIKES = lv.spikes.map(o => ({...o}));
  COINS = lv.coins.map(o => ({...o}));
  MONSTERS = (lv.monsters || []).map(o => ({...o, alive:true, squashT:0, dir:-1, attackCD:180+Math.floor(Math.random()*80)}));
  FLAG = {...lv.flag};
  LEVEL_W = lv.width;
  // 清掉残留子弹粒子（玩家 & 敌方）
  particles = particles.filter(p => !p.isBullet && !p.isPlayerBullet);
  // 重置玩家
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
  // 重置关卡统计
  lives = 3; coinsCollected = 0; deaths = 0; levelTimer = 0; monsterKills = 0;
  // 重置冲刺/无敌等瞬时状态
  dashTimer = 0; dashCooldown = 0; dashDir = 0;
  dashReadyL = 0; dashReadyR = 0;
  djWindow = 0; p2JumpHeld = false;
  invincibleTimer = 0; deadTimer = 0; winTimer = 0;
  cameraX = 0;
  lastSafeX = 60; lastSafeY = GROUND_Y - CHAR_H - 10;
  if (msgStayTimer) { clearTimeout(msgStayTimer); msgStayTimer = null; }
  // 清除 R 键状态，防止按住 R 反复触发
  keys['KeyR'] = false;
  syncKeyHud('KeyR', false);
  gameState = 'playing';
  setBodyState();
  showMsg('已重置本关');
}

/* ============================================
 * 渲染
 * ============================================ */
function draw() {
  ctx.globalAlpha = 1; // 每帧强制重置，防闪现
  // 通关画面
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#fd0'; ctx.font = 'bold 40px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 完美配合！', CANVAS_W/2, 180);
    ctx.fillText('通关成功！', CANVAS_W/2, 230);
    ctx.fillStyle = '#fff'; ctx.font = '16px -apple-system';
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    ctx.fillText(hasNext ? 'Enter 下一关  ·  Backspace 回菜单' : 'Backspace 回菜单', CANVAS_W/2, 290);
    ctx.fillText('或等待5秒自动返回', CANVAS_W/2, 320);
    ctx.textAlign = 'left';
    return;
  }
  // 开始菜单（含选关）
  if (gameState === 'menu') {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.textAlign = 'center';
    // 计算总高度，居中分布
    const rowH = 38, listW = 400;
    const totalH = 70 + 20 + rowH*totalLevels + 30; // 标题+间距+列表+底部
    const topOffset = (CANVAS_H - totalH) / 2;
    // 标题
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px -apple-system';
    ctx.fillText('双人跑酷', CANVAS_W/2, topOffset+36);
    // 关卡列表
    const startY = topOffset + 90;
    for (let i=1; i<=totalLevels; i++) {
      const y = startY + (i-1)*rowH;
      const sel = i===menuSelection;
      if (sel) { ctx.fillStyle = 'rgba(255,200,0,0.12)'; ctx.fillRect(CANVAS_W/2-listW/2, y-15, listW, 30); }
      ctx.font = sel?'bold 16px -apple-system':'14px -apple-system';
      ctx.fillStyle = sel?'#fd0':'#aaa';
      const hs = highScores[i]||0;
      ctx.fillText((sel?'▶ ':'  ')+'第'+i+'关  '+LEVELS[i].name+(hs?'  最高'+hs:'  无记录'), CANVAS_W/2, y);
    }
    ctx.font = '13px -apple-system'; ctx.fillStyle = '#ff0';
    ctx.fillText('Tab 切换角色: '+(charSelect===0?'👦 男性':'👧 女性')+'  |  ↑↓ 选择  ·  Enter 进入  ·  1-'+totalLevels+' 快速选关', CANVAS_W/2, startY+totalLevels*rowH+30);
    if (window._err) { ctx.fillStyle='#f44'; ctx.font='12px monospace'; ctx.fillText('错误: '+window._err, CANVAS_W/2, startY+totalLevels*rowH+50); }
    ctx.textAlign = 'left'; return;
  }

  ctx.save();
  ctx.translate(-cameraX, 0);

  /* ---- 天空 ---- */
  ctx.fillStyle = '#5c94fc'; ctx.fillRect(cameraX, 0, CANVAS_W, CANVAS_H);
  // 像素云
  ctx.fillStyle = '#ffffff';
  for (let cx = (cameraX-cameraX%200)-100; cx < cameraX+CANVAS_W+200; cx += 200) {
    const cy = 40 + ((cx*7)%60);
    ctx.fillRect(cx,cy,40,16); ctx.fillRect(cx+12,cy-10,56,20); ctx.fillRect(cx+24,cy-16,32,16);
    ctx.fillRect(cx+44,cy-6,28,14);
  }
  // 远山
  for (let hx = (cameraX-cameraX%160)-80; hx < cameraX+CANVAS_W+160; hx += 160) {
    ctx.fillStyle = '#68b838';
    ctx.beginPath(); ctx.moveTo(hx-30,GROUND_Y); ctx.lineTo(hx+20,GROUND_Y-60); ctx.lineTo(hx+80,GROUND_Y); ctx.fill();
    ctx.fillStyle = '#58a828';
    ctx.beginPath(); ctx.moveTo(hx+10,GROUND_Y); ctx.lineTo(hx+50,GROUND_Y-40); ctx.lineTo(hx+70,GROUND_Y); ctx.fill();
  }

  /* ---- 地面（像素砖块） ---- */
  const brkColors = ['#c84c30','#b84028','#a83820'];
  for (const g of GROUNDS) {
    // 泥土
    ctx.fillStyle = '#c84c30'; ctx.fillRect(g.x, g.y, g.w, g.h);
    // 砖块纹理
    for (let bx=g.x; bx<g.x+g.w; bx+=32) {
      for (let by=g.y; by<g.y+g.h; by+=16) {
        const ci = ((bx/32)+(by/16))%3;
        ctx.fillStyle = brkColors[ci];
        ctx.fillRect(bx, by, 31, 15);
        ctx.fillStyle = '#d46040'; ctx.fillRect(bx, by, 31, 3);
        ctx.fillStyle = '#903020'; ctx.fillRect(bx, by+12, 31, 3);
      }
    }
    // 草地顶部
    ctx.fillStyle = '#38b838'; ctx.fillRect(g.x, g.y, g.w, 10);
    ctx.fillStyle = '#48d848'; ctx.fillRect(g.x, g.y, g.w, 4);
    // 草地纹理
    for (let gx=g.x; gx<g.x+g.w; gx+=8) {
      ctx.fillStyle = (Math.floor(gx/8)%2)?'#48d040':'#38b030';
      ctx.fillRect(gx+1, g.y+6, 6, 2);
    }
  }

  /* ---- 平台（像素砖块） ---- */
  for (const p of PLATFORMS) {
    for (let bx=p.x; bx<p.x+p.w; bx+=16) {
      ctx.fillStyle = (Math.floor(bx/16)%2)?'#c84c30':'#d86040';
      ctx.fillRect(bx, p.y, 15, p.h);
      ctx.fillStyle = '#e87850'; ctx.fillRect(bx, p.y, 15, 3);
      ctx.fillStyle = '#903020'; ctx.fillRect(bx, p.y+p.h-3, 15, 3);
      // 砖缝
      ctx.fillStyle = '#1a0808'; ctx.fillRect(bx-1, p.y, 1, p.h); ctx.fillRect(bx-1, p.y+p.h/2, 15, 1);
    }
  }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    const isPlatSpike = s.onPlatform || false;
    const sy = isPlatSpike ? s.y : s.y;
    for (let sx = s.x; sx < s.x+s.w; sx += 12) {
      ctx.fillStyle = '#e83030';
      ctx.beginPath(); ctx.moveTo(sx, sy+s.h); ctx.lineTo(sx+6, sy); ctx.lineTo(sx+12, sy+s.h); ctx.fill();
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.moveTo(sx+2, sy+s.h); ctx.lineTo(sx+6, sy+2); ctx.lineTo(sx+10, sy+s.h); ctx.fill();
    }
  }

  /* ---- 金币 ---- */
  for (const c of COINS) {
    const bob = Math.sin(Date.now()/300 + c.x) * 2;
    const w = Math.abs(Math.cos(Date.now()/400 + c.x)) * 10 + 4; // 旋转宽度变化
    const cx = c.x, cy = c.y + bob;
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-w/2, cy-5, w, 10);
    ctx.fillStyle = '#ff8'; ctx.fillRect(cx-w/2+2, cy-3, w-4, 6);
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-3, cy-3, 6, 6); ctx.fillStyle = '#ff8'; ctx.fillRect(cx-2, cy-2, 4, 4);
  }

  /* ---- 终点旗杆 ---- */
  const flagWave = Math.sin(Date.now()/400)*4;
  ctx.fillStyle = '#888'; ctx.fillRect(FLAG.x+4, FLAG.y, 4, FLAG.h);
  ctx.fillStyle = '#48c848'; ctx.fillRect(FLAG.x-2, FLAG.y+4+flagWave, 32, 18);
  ctx.fillStyle = '#fff'; ctx.fillRect(FLAG.x+2, FLAG.y+8+flagWave, 16, 8);
  ctx.fillStyle = '#fd0'; ctx.beginPath(); ctx.arc(FLAG.x+6, FLAG.y, 8, 0, Math.PI*2); ctx.fill();

  /* ---- 怪物 ---- */
  for (const m of MONSTERS) {
    if (!m.alive && m.squashT <= 0) continue;
    const mx=m.x, my=m.y, alpha = m.alive?1:0.5;
    ctx.globalAlpha = alpha;
    // 身体
    ctx.fillStyle = '#7c3aed'; ctx.fillRect(mx+2, my+6, MONSTER_W-4, MONSTER_H-8);
    ctx.fillStyle = '#a78bfa'; ctx.fillRect(mx+4, my+8, MONSTER_W-8, 6);
    // 眼睛
    ctx.fillStyle = '#fff'; ctx.fillRect(mx+6, my+10, 6, 6); ctx.fillRect(mx+MONSTER_W-12, my+10, 6, 6);
    ctx.fillStyle = '#000'; ctx.fillRect(m.dir>0?mx+8:mx+6, my+12, 3, 3); ctx.fillRect(m.dir>0?mx+MONSTER_W-10:mx+MONSTER_W-12, my+12, 3, 3);
    // 脚
    ctx.fillStyle = '#5b21b6'; ctx.fillRect(mx+4, my+MONSTER_H-6, 8, 6); ctx.fillRect(mx+MONSTER_W-12, my+MONSTER_H-6, 8, 6);
    ctx.globalAlpha = 1;
  }

  /* ---- 冲刺残影 ---- */
  if (dashTimer > 0) {
    for (let i=1; i<=3; i++) {
      const ax = player.x - dashDir * i * 12;
      const alpha = 1 - i*0.3;
      ctx.globalAlpha = alpha * 0.4;
      ctx.fillStyle = '#fff'; ctx.fillRect(ax+2, player.y+10, CHAR_W-4, CHAR_H-12);
    }
    ctx.globalAlpha = 1;
  }

  /* ---- 角色（像素精绘） ---- */
  const showChar = gameState !== 'gameover';
  if (invincibleTimer > 0) ctx.globalAlpha = 0.4 + Math.sin(invincibleTimer * 0.5) * 0.2;
  if (showChar) {
    const p = player, px=p.x, py=p.y, inAir=!p.onGround;
    const dir = dashTimer>0 ? dashDir : (p.vx!==0 ? (p.vx>0?1:-1) : (p.dir||1));
    p.dir = dir; const flipX = dir < 0;
    const PS = 2; // 每像素2px

    // 冲刺冷却条
    if (dashCooldown > 0) {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px,py-10,CHAR_W,4);
      ctx.fillStyle='#fff'; ctx.fillRect(px,py-10,CHAR_W*(1-dashCooldown/DASH_COOLDOWN),4);
    } else if (dashTimer <= 0) {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px,py-10,CHAR_W,4);
      ctx.fillStyle='#fb5'; ctx.fillRect(px,py-10,CHAR_W,4);
    }

    // 调色板: 0透明 1发色 2发暗 3肤色 4肤暗 5眼白 6瞳 7嘴
    //         8白T 9T暗 A牛仔裤 B裤亮 C鞋面 D鞋底 E金 F白 G黑发
    const C = [null,'#4a3728','#2a1a10','#ffe8c0','#e8c8a0','#fff','#111','#c44',
               '#f8f8f8','#ddd','#3058d8','#5080f0','#e8e8e8','#444','#fd0','#fff','#1a1a1a','#111','#ff4080','#111'];
    // 男性精灵 [17×14]
    const spMStand = [
      '00011111111100','00111111111110','01122222222211','01111111111111',
      '11115333333511','11153666335111','11113636335111','11113333337111',
      '08888888888880','08888888888880','08999999999980','0AAABBBBAAAB0',
      '0AAABBBBAAAB0','0AAABBBBAAAB0','0AAABBBBAAAB0',
      '00CCDDDDDDCC00','000DDDDDDDD000',
    ];
    const spMAir = [
      '00011111111100','00111111111110','01122222222211','03531111111353',
      '11153666335111','11113636335111','11113333337111','08888888888880',
      '08888888888880','08999999999980','0AAABBBBAAAB0','0AA0BBB0AAAB0',
      '0AA0BBB0AAAB0','0AA0BBB0AAAB0',
      '00CCDDDDDDCC00','000DDDDDDDD000',
    ];
    // 女性精灵（黑色波波头+粉色蝴蝶结）
    const spFStand = [
      '0000IIIIII0000','000IIIIIIII000','00IIIGGGGIII00','0II11111111II0',
      'II1153333335II','11153666335111','11113636335111','11113333337111',
      '08888888888880','08888888888880','08999999999980','0AAABBBBAAAB0',
      '0AAABBBBAAAB0','0AAABBBBAAAB0','0AAABBBBAAAB0',
      '00CCDDDDDDCC00','000DDDDDDDD000',
    ];
    const spFAir = [
      '0000IIIIII0000','000IIIIIIII000','00IIIGGGGIII00','0II11111111II0',
      'II35333333353II','11153666335111','11113636335111','11113333337111',
      '08888888888880','08888888888880','08999999999980','0AAABBBBAAAB0',
      '0AA0BBB0AAAB0','0AA0BBB0AAAB0','0AA0BBB0AAAB0',
      '00CCDDDDDDCC00','000DDDDDDDD000',
    ];
    const isFemale = charSelect === 1;
    const spStand = isFemale ? spFStand : spMStand;
    const spAir = isFemale ? spFAir : spMAir;
    const sprite = inAir ? spAir : spStand;

    // 阴影
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(px+4,py+CHAR_H-2,20,4);

    // 绘制像素
    for (let sy=0; sy<sprite.length; sy++) {
      for (let sx=0; sx<sprite[sy].length; sx++) {
        const ci = sprite[sy][sx], c = C[parseInt(ci,16)];
        if (!c) continue;
        ctx.fillStyle = c;
        const dx = flipX ? (CHAR_W - (sx+1)*PS) : sx*PS;
        ctx.fillRect(px+dx, py+4+sy*PS, PS, PS);
      }
    }

    // 冲刺速度线
    if (dashTimer>0){ctx.fillStyle='rgba(255,255,255,0.6)';for(let i=0;i<3;i++)ctx.fillRect(flipX?px-10:px+CHAR_W,py+14+i*8,10,3)}
    // 跳跃光圈
    if (!p.onGround&&p.jumpsUsed>=1){ctx.fillStyle='rgba(100,180,255,0.25)';ctx.beginPath();ctx.arc(p.x+CHAR_W/2,p.y+CHAR_H,20,0,Math.PI*2);ctx.fill()}
  }
  ctx.globalAlpha = 1;

  /* ---- 粒子 ---- */
  for (const p of particles) {
    const alpha = Math.min(1, p.life/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const s = p.size || 3;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  /* ---- 屏幕底部按键提示（按键响应可视化） ---- */
  drawKeyHud();

}

/* ============================================
 * 按键 HUD —— 屏幕底部
 * ============================================ */
function drawKey() {
  // 通用绘制：键位方块
  // args: x, y, label, isOn, onColor
}
function drawKeyHud() {
  if (gameState !== 'playing' && gameState !== 'dead' && gameState !== 'win' && gameState !== 'gameover') return;

  const keyW = 30, keyH = 30, gap = 4;
  const p1Color = '#5bf', p2Color = '#fb5';

  // 屏幕底部居中
  const totalW = (keyW * 3 + gap * 2) + 60 + (keyW * 3 + gap * 2) + 60; // P1 4键 + 分隔 + P2 5键
  const baseX = (CANVAS_W - totalW) / 2;
  const baseY = CANVAS_H - keyH - 6;

  ctx.font = '11px -apple-system';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  let x = baseX;

  // ── P1 标签 ──
  ctx.fillStyle = p1Color;
  ctx.fillText('P1', x + 10, baseY + keyH/2);
  x += 24;

  // A
  drawKeyBox(x, baseY, keyW, keyH, 'A', !!keys['KeyA'], p1Color);
  x += keyW + gap;
  // D
  drawKeyBox(x, baseY, keyW, keyH, 'D', !!keys['KeyD'], p1Color);
  x += keyW + gap;
  // W
  drawKeyBox(x, baseY, keyW, keyH, 'W', !!keys['KeyW'], p1Color);
  x += keyW + gap;
  // 空白位以让 P1/P2 间距更宽
  x += 20;

  // ── P2 标签 ──
  ctx.fillStyle = p2Color;
  ctx.fillText('P2', x + 10, baseY + keyH/2);
  x += 24;

  // ←
  drawKeyBox(x, baseY, keyW, keyH, '←', !!keys['ArrowLeft'], p2Color);
  x += keyW + gap;
  // ↑
  drawKeyBox(x, baseY, keyW, keyH, '↑', !!keys['ArrowUp'], p2Color);
  x += keyW + gap;
  // ↓
  drawKeyBox(x, baseY, keyW, keyH, '↓', !!keys['ArrowDown'], p2Color);
  x += keyW + gap;
  // →
  drawKeyBox(x, baseY, keyW, keyH, '→', !!keys['ArrowRight'], p2Color);
  x += keyW + gap;
  // ESC
  drawKeyBox(x, baseY, keyW * 1.3, keyH, 'ESC', !!keys['Escape'], '#fd0');
}

function drawKeyBox(x, y, w, h, label, isOn, color) {
  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(x+1, y+2, w, h);
  // 底色（按下时高亮）
  if (isOn) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  } else {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x, y, w, 3); // 顶部高光
  }
  // 边框
  ctx.strokeStyle = isOn ? '#fff' : '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  // 文字
  ctx.fillStyle = isOn ? '#000' : '#fff';
  ctx.font = isOn ? 'bold 13px -apple-system' : '12px -apple-system';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2 + 1);
}

/* ============================================
 * 消息
 * ============================================ */
let msgTimeout;
function showMsg(text, autoHide=true) {
  const el = document.getElementById('msg');
  el.innerHTML = text.replace(/\n/g, '<br>');
  el.style.opacity = '1';
  if (autoHide) { clearTimeout(msgTimeout); msgTimeout = setTimeout(() => el.style.opacity = '0', 2000); }
}

/* ============================================
 * 循环
 * ============================================ */
let lastFrame = 0;
function loop(ts) {
  if (ts - lastFrame >= 16) {  // 锁定60fps，高刷屏不加速
    lastFrame = ts;
    update(); draw();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
