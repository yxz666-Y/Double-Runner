<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;overflow:hidden}
canvas{display:block;border:1px solid #333}
#hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
#hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
#p1{color:#5bf}#p2{color:#fb5}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#fff;background:rgba(0,0,0,0.8);padding:16px 32px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;text-align:center}
/* HUD 默认隐藏，游戏中才显示 */
#hud{display:none}
body.playing #hud, body.dead #hud, body.win #hud, body.gameover #hud{display:flex;gap:30px;color:#fff;font-size:13px;margin-bottom:4px}
body.playing #hud span, body.dead #hud span, body.win #hud span, body.gameover #hud span{background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px}
/* 按键提示栏 */
#hud-keys{display:none;gap:14px;color:#fff;font-size:12px;margin:4px 0 6px 0;align-items:center}
body.playing #hud-keys, body.dead #hud-keys, body.win #hud-keys, body.gameover #hud-keys{display:flex}
#hud-keys .kp{background:rgba(0,0,0,0.55);padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
#hud-keys .kp b{display:inline-block;background:#222;border:1px solid #555;border-bottom-width:2px;border-radius:4px;padding:1px 6px;margin:0 1px;font-size:11px;line-height:1;min-width:14px;text-align:center;color:#fff;transition:all 0.08s}
#hud-keys .kp-p1 b{border-color:#5bf;color:#5bf;box-shadow:0 0 0 rgba(91,187,255,0)}
#hud-keys .kp-p2 b{border-color:#fb5;color:#fb5;box-shadow:0 0 0 rgba(255,187,85,0)}
#hud-keys .kp-esc b{border-color:#fd0;color:#fd0;box-shadow:0 0 0 rgba(255,221,0,0)}
/* 按键按下时高亮（JS 会动态加 .on 类） */
#hud-keys .kp b.on{background:currentColor;color:#000;border-color:#fff;transform:translateY(1px)}
#hud-keys .kp-p1 .on{background:#5bf}
#hud-keys .kp-p2 .on{background:#fb5}
#hud-keys .kp-esc .on{background:#fd0}
/* 设置面板遮罩 */
#settings-panel{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:20;cursor:pointer}
body.settings #settings-panel{display:flex}
#settings-panel .box{background:rgba(20,20,30,0.95);border:2px solid #fd0;border-radius:14px;padding:28px 40px;min-width:360px;text-align:center;box-shadow:0 0 30px rgba(255,200,0,0.3)}
#settings-panel h2{color:#fd0;font-size:28px;margin:0 0 18px 0;font-family:-apple-system,sans-serif}
#settings-panel .opt{display:block;width:100%;margin:8px 0;padding:14px 0;font-size:20px;color:#fff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-family:-apple-system,sans-serif;transition:all 0.15s}
#settings-panel .opt:hover, #settings-panel .opt.sel{background:rgba(255,200,0,0.25);border-color:#fd0;color:#fd0;transform:scale(1.03)}
#settings-panel .hint{margin-top:14px;font-size:13px;color:#888;font-family:-apple-system,sans-serif}

/* 声音设置面板 */
#audio-panel{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:25;cursor:pointer}
body.audiosettings #audio-panel{display:flex}
#audio-panel .audio-box{background:rgba(20,20,30,0.97);border:2px solid #fd0;border-radius:14px;padding:24px 36px;min-width:380px;text-align:center;box-shadow:0 0 30px rgba(255,200,0,0.3)}
#audio-panel h2{color:#fd0;font-size:24px;margin:0 0 18px 0;font-family:-apple-system,sans-serif}
#audio-panel .aud-row{display:flex;align-items:center;gap:12px;margin:14px 0;padding:8px 12px;background:rgba(255,255,255,0.05);border-radius:8px}
#audio-panel .aud-row label{color:#fff;font-size:15px;min-width:80px;text-align:left;font-family:-apple-system,sans-serif}
#audio-panel .aud-row input[type=range]{flex:1;height:6px;-webkit-appearance:none;background:#222;border-radius:3px;outline:none}
#audio-panel .aud-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fd0;cursor:pointer;border:2px solid #fff}
#audio-panel .aud-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fd0;cursor:pointer;border:2px solid #fff}
#audio-panel .aud-row span{color:#fd0;font-size:14px;min-width:42px;text-align:right;font-family:monospace}
#audio-panel .audio-close{margin-top:14px;padding:10px 32px;font-size:16px;color:#000;background:#fd0;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-family:-apple-system,sans-serif}
#audio-panel .audio-close:hover{background:#fff}
#audio-panel .hint{margin-top:10px;font-size:12px;color:#888;font-family:-apple-system,sans-serif}
</style>
</head>
<body>
<div id="hud">
  <span>❤️ x<b id="lives">3</b></span>
  <span>🪙 <b id="coins">0</b></span>
  <span>👤 P1+P2</span>
  <span id="level-tag" style="color:#fd0">第 1 关</span>
</div>
<div id="hud-keys">
  <span class="kp kp-p1"><b>A</b>/<b>D</b> 移动 · <b>W</b> 二段跳</span>
  <span class="kp kp-p2"><b>↑</b> 跳 · <b>↓</b> 射击 · <b>←</b>/<b>→</b> 冲刺</span>
  <span class="kp kp-esc"><b>ESC</b> 设置</span>
</div>
<canvas id="game"></canvas>
<div id="msg"></div>
<div id="settings-panel" onclick="if(event.target.id==='settings-panel')closeSettings()">
  <div class="box">
    <h2>⚙ 设置</h2>
    <button class="opt" data-act="resume">▶ 继续游戏</button>
    <button class="opt" data-act="restart">🔄 重新开始</button>
    <button class="opt" data-act="menu">🏠 回到主页</button>
    <div class="hint">↑↓ 选择  ·  Enter 确认  ·  ESC 关闭</div>
  </div>
</div>
<div id="audio-panel" onclick="if(event.target.id==='audio-panel')closeAudioSettings()">
  <div class="audio-box">
    <h2>🔊 声音设置</h2>
    <div class="aud-row">
      <label>🎵 背景音</label>
      <input type="range" id="bgm-vol" min="0" max="100" value="50">
      <span id="bgm-vol-val">50%</span>
    </div>
    <div class="aud-row">
      <label>🔔 效果音</label>
      <input type="range" id="sfx-vol" min="0" max="100" value="70">
      <span id="sfx-vol-val">70%</span>
    </div>
    <button class="audio-close" onclick="closeAudioSettings()">✓ 确定</button>
    <div class="hint">拖动滑块调节音量</div>
  </div>
</div>
<audio id="bgmPlayer" loop preload="auto" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" src="bgm.mp3"></audio>
<script>
/* ============================================
 * 常量 —— 调参区
 * ============================================ */
const CANVAS_W = 800, CANVAS_H = 500;       // 画布
const GRAVITY      = 0.55;   // 重力加速度
const JUMP_V       = -9.0;   // 一段跳初速度
const DOUBLE_JUMP_V= -7.5;   // 二段跳初速度
const MOVE_SPEED   = 3.5;    // 水平移速
const DASH_SPEED   = 9;      // 冲刺速度
const DASH_DURATION= 8;      // 冲刺持续帧数
const DASH_COOLDOWN= 60;     // 冲刺冷却帧数
const DJ_WINDOW    = 30;     // 二段跳时间窗
const DASH_WINDOW  = 15;     // 冲刺就绪窗
const GROUND_Y     = 430;    // 地面 y 坐标
const CHAR_W = 28, CHAR_H = 38; // 角色尺寸
const MONSTER_W = 32, MONSTER_H = 28;        // 怪兽尺寸
const ENEMY_BULLET_SPEED = 4.0;              // 怪兽弹幕速度
const MONSTER_DMG = 1;                       // 怪兽碰撞伤害
const BULLET_SPEED = 8;                      // 玩家子弹速度

/* ============================================
 * 画布
 * ============================================ */
const canvas = document.getElementById('game');
canvas.width = CANVAS_W; canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

/* ============================================
 * 游戏状态
 * ============================================ */
let player = { x:60, y:GROUND_Y-CHAR_H-10, w:CHAR_W, h:CHAR_H, vx:0, vy:0, onGround:false, jumpsUsed:0, maxJumps:2 };
let cameraX = 0;
let lives = 3, coinsCollected = 0, deaths = 0;
let gameState = 'menu'; // menu | playing | win | dead | gameover | settings
let deadTimer = 0, winTimer = 0;
let particles = [];
let prevGameState = ''; // 记录打开设置前的状态
let settingsSelection = 0; // 0=继续 1=重新开始 2=回到主页

// 同步 body class 以便 CSS 控制 HUD/设置面板显隐
function setBodyState() {
  document.body.className = gameState;
}
setBodyState();

// 同步顶部按键 HUD 高亮：把按键 code 映射到 .kp 内的 <b> 标签
const KEY_HUD_MAP = {
  KeyA: '.kp-p1 b:nth-child(1)',
  KeyD: '.kp-p1 b:nth-child(2)',
  KeyW: '.kp-p1 b:nth-child(3)',
  ArrowUp:    '.kp-p2 b:nth-child(1)',
  ArrowDown:  '.kp-p2 b:nth-child(2)',
  ArrowLeft:  '.kp-p2 b:nth-child(3)',
  ArrowRight: '.kp-p2 b:nth-child(4)',
  Escape:     '.kp-esc b',
};
function syncKeyHud(code, isOn) {
  const sel = KEY_HUD_MAP[code]; if (!sel) return;
  const el = document.querySelector('#hud-keys ' + sel);
  if (el) el.classList.toggle('on', !!isOn);
}

/* ============================================
 * 像素字体（5x7 矩阵）
 *   1 = 实心像素，0 = 透明
 *   用于菜单标题与副标题
 * ============================================ */
const PIXEL_FONT = {
  // A-Z
  A: ['01110','10001','10001','11111','10001','10001','10001'],
  B: ['11110','10001','10001','11110','10001','10001','11110'],
  C: ['01110','10001','10000','10000','10000','10001','01110'],
  D: ['11110','10001','10001','10001','10001','10001','11110'],
  E: ['11111','10000','10000','11110','10000','10000','11111'],
  F: ['11111','10000','10000','11110','10000','10000','10000'],
  G: ['01110','10001','10000','10111','10001','10001','01110'],
  H: ['10001','10001','10001','11111','10001','10001','10001'],
  I: ['11111','00100','00100','00100','00100','00100','11111'],
  J: ['00111','00010','00010','00010','00010','10010','01100'],
  K: ['10001','10010','10100','11000','10100','10010','10001'],
  L: ['10000','10000','10000','10000','10000','10000','11111'],
  M: ['10001','11011','10101','10001','10001','10001','10001'],
  N: ['10001','11001','10101','10011','10001','10001','10001'],
  O: ['01110','10001','10001','10001','10001','10001','01110'],
  P: ['11110','10001','10001','11110','10000','10000','10000'],
  Q: ['01110','10001','10001','10001','10101','10010','01101'],
  R: ['11110','10001','10001','11110','10100','10010','10001'],
  S: ['01111','10000','10000','01110','00001','00001','11110'],
  T: ['11111','00100','00100','00100','00100','00100','00100'],
  U: ['10001','10001','10001','10001','10001','10001','01110'],
  V: ['10001','10001','10001','10001','10001','01010','00100'],
  W: ['10001','10001','10001','10001','10101','11011','10001'],
  X: ['10001','10001','01010','00100','01010','10001','10001'],
  Y: ['10001','10001','01010','00100','00100','00100','00100'],
  Z: ['11111','00001','00010','00100','01000','10000','11111'],
  // 0-9
  '0': ['01110','10001','10011','10101','11001','10001','01110'],
  '1': ['00100','01100','00100','00100','00100','00100','01110'],
  '2': ['01110','10001','00001','00010','00100','01000','11111'],
  '3': ['11110','00001','00001','01110','00001','00001','11110'],
  '4': ['00010','00110','01010','10010','11111','00010','00010'],
  '5': ['11111','10000','11110','00001','00001','10001','01110'],
  '6': ['00110','01000','10000','11110','10001','10001','01110'],
  '7': ['11111','00001','00010','00100','01000','01000','01000'],
  '8': ['01110','10001','10001','01110','10001','10001','01110'],
  '9': ['01110','10001','10001','01111','00001','00010','01100'],
  // 符号
  '!': ['00100','00100','00100','00100','00100','00000','00100'],
  '?': ['01110','10001','00001','00010','00100','00000','00100'],
  '.': ['00000','00000','00000','00000','00000','00110','00110'],
  ',': ['00000','00000','00000','00000','00110','00110','01000'],
  ':': ['00000','00110','00110','00000','00110','00110','00000'],
  '-': ['00000','00000','00000','11111','00000','00000','00000'],
  '_': ['00000','00000','00000','00000','00000','00000','11111'],
  "'": ['00100','00100','00100','00000','00000','00000','00000'],
  ' ': ['00000','00000','00000','00000','00000','00000','00000'],
};
/**
 * 用 5x7 像素字体渲染字符串
 * @param {string} text
 * @param {number} x  起始 x（左上角）
 * @param {number} y  起始 y（左上角）
 * @param {number} pixel  单个像素的尺寸（px）
 * @param {string} color 像素颜色
 * @param {string} shadow 可选：投影颜色
 * @returns {number} 渲染后占用的总宽度
 */
function drawPixelText(text, x, y, pixel, color, shadow) {
  text = String(text).toUpperCase();
  let curX = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const glyph = PIXEL_FONT[ch] || PIXEL_FONT[' '];
    // 投影
    if (shadow) {
      ctx.fillStyle = shadow;
      for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 5; c++) {
          if (glyph[r][c] === '1') ctx.fillRect(curX + c * pixel + 2, y + r * pixel + 2, pixel, pixel);
        }
      }
    }
    // 主体
    ctx.fillStyle = color;
    for (let r = 0; r < 7; r++) {
      for (let c = 0; c < 5; c++) {
        if (glyph[r][c] === '1') ctx.fillRect(curX + c * pixel, y + r * pixel, pixel, pixel);
      }
    }
    // 字符间距 1 像素
    curX += (5 + 1) * pixel;
  }
  return curX - x;
}
function pixelTextWidth(text, pixel) {
  return text.length * (5 + 1) * pixel - pixel;
}

/* ============================================
 * 16x16 中文字模（双人跑酷 4 字）
 *   每字 16 行 × 16 列，1=实心 0=透明
 * ============================================ */
const CN_FONT = {
  '双': [
    '0000000000000000',
    '0000000000000000',
    '0001111000111100',
    '0001001000100010',
    '0001001000100010',
    '0001001000111100',
    '0001001000100010',
    '0001001000100010',
    '0001111000100010',
    '0001001000111100',
    '0001001000100010',
    '0001001000100010',
    '0001001000100010',
    '0001001000100010',
    '0000000000000000',
    '0000000000000000',
  ],
  '人': [
    '0000000000000000',
    '0000000000000000',
    '0000000000000000',
    '0000010000010000',
    '0000010000010000',
    '0000010000010000',
    '0000101000101000',
    '0000101000101000',
    '0000101000101000',
    '0001000101000100',
    '0001000101000100',
    '0010000010000010',
    '0010000010000010',
    '0100000100000001',
    '0000000000000000',
    '0000000000000000',
  ],
  '跑': [
    '0000000000000000',
    '0001110000000000',
    '0010001000000000',
    '0100000100111000',
    '0100001001001000',
    '0010010001001000',
    '0001100001111100',
    '0110011000000000',
    '1001100100111100',
    '1000000101001000',
    '0110011001001000',
    '0001100001111100',
    '0010010001001000',
    '0100001001001000',
    '0000000000000000',
    '0000000000000000',
  ],
  '酷': [
    '0000000000000000',
    '0010000000100000',
    '0010000000100000',
    '1111111011111110',
    '0010000000100000',
    '0011111000111110',
    '0000001000000010',
    '0000010000000100',
    '0000011111100100',
    '0000010001000100',
    '0000010001000100',
    '0000011111100100',
    '0000010000000100',
    '0000010000000100',
    '0000000000000000',
    '0000000000000000',
  ],
};
/** 渲染中文字符串（16x16 像素字模） */
function drawCNText(text, x, y, pixel, color, shadow) {
  let curX = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const glyph = CN_FONT[ch];
    if (!glyph) { curX += 16 * pixel; continue; }
    // 阴影
    if (shadow) {
      ctx.fillStyle = shadow;
      for (let r = 0; r < 16; r++) for (let c = 0; c < 16; c++) {
        if (glyph[r][c] === '1') ctx.fillRect(curX + c * pixel + 2, y + r * pixel + 2, pixel, pixel);
      }
    }
    // 主体
    ctx.fillStyle = color;
    for (let r = 0; r < 16; r++) for (let c = 0; c < 16; c++) {
      if (glyph[r][c] === '1') ctx.fillRect(curX + c * pixel, y + r * pixel, pixel, pixel);
    }
    // 字符间距
    curX += (16 + 2) * pixel;
  }
  return curX - x;
}
function cnTextWidth(text, pixel) {
  if (text.length === 0) return 0;
  return text.length * (16 + 2) * pixel - 2 * pixel;
}

// ═══ 音效系统设置 ═══
let sfxVolume = 0.7;
let musicVolume = 0.5;
// 实际播放时给 BGM 的音量倍率（HTMLAudioElement 不能太响，先压到 0.6 再乘 musicVolume）
const BGM_VOL_SCALE = 0.6;
// 加载本地存储的音量
try {
  const saved = JSON.parse(localStorage.getItem('duoRunnerAudio') || '{}');
  if (typeof saved.sfx === 'number') sfxVolume = saved.sfx;
  if (typeof saved.bgm === 'number') musicVolume = saved.bgm;
} catch(e) {}
function saveAudioSettings() {
  try { localStorage.setItem('duoRunnerAudio', JSON.stringify({sfx: sfxVolume, bgm: musicVolume})); } catch(e) {}
}

// ═══ 音效系统（Web Audio API 合成） ═══
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type='sine', vol=1) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol * sfxVolume * 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

// 各种音效
function sfxJump()    { playTone(520, 0.12, 'square', 1); setTimeout(()=>playTone(680,0.1,'square',0.7),60); }
function sfxDash()    { playTone(300, 0.08, 'sawtooth', 0.6); playTone(200, 0.15, 'sawtooth', 0.4); }
function sfxCoin()    { playTone(880, 0.08, 'sine', 1); setTimeout(()=>playTone(1200,0.1,'sine',0.8),80); }
function sfxDie()     { playTone(400, 0.15, 'sawtooth', 0.8); setTimeout(()=>playTone(200,0.2,'sawtooth',0.6),120); }
function sfxWin()     { [0,100,200,300].forEach((d,i)=>setTimeout(()=>playTone(660+i*110,0.2,'sine',1),d)); }
function sfxShoot()   { playTone(800, 0.05, 'square', 0.4); playTone(1200, 0.04, 'sawtooth', 0.3); }
function sfxBump()    { playTone(180, 0.08, 'square', 0.5); }
function sfxPause()   { playTone(440, 0.06, 'sine', 0.6); setTimeout(()=>playTone(330,0.06,'sine',0.5),80); }

// === 专属交互音效 ===
// Enter 确认：上升两音+亮尾音（清亮、像"叮咚"）
function sfxConfirm() {
  playTone(660, 0.08, 'sine', 0.9);
  setTimeout(() => playTone(880, 0.10, 'sine', 0.9), 70);
  setTimeout(() => playTone(1320, 0.14, 'sine', 0.7), 140);
}
// Backspace 返回：下降两音（低沉、像"关门"）
function sfxBack() {
  playTone(330, 0.10, 'sine', 0.7);
  setTimeout(() => playTone(220, 0.14, 'sine', 0.6), 90);
}
// 按钮切换/移动（↑↓ Tab）：柔和短音（像菜单 hover）
function sfxClick() {
  playTone(520, 0.05, 'square', 0.5);
}
// 滑动条/滑块拖动：极短高频
function sfxTick() {
  playTone(1200, 0.03, 'sine', 0.3);
}

// ═══ 背景音乐 ═══
let bgmAudio = null;
// ═══ 菜单/开始界面 BGM ═══
// 设计：仅在主菜单（gameState==='menu'）播放；进入关卡（playing/dead/win/settings/audiosettings/gameover）暂停；
//        回到主菜单重新播放
/** 启动 BGM（一次性，整个游戏期间一直循环播放） */
function playBGM() {
  try {
    const el = document.getElementById('bgmPlayer');
    if (!el) return;
    if (!bgmAudio) {
      if (!el.src || el.src.endsWith('/')) el.src = 'bgm.mp3';
      bgmAudio = el;
      bgmAudio.loop = true;
    }
    bgmAudio.volume = musicVolume * BGM_VOL_SCALE;
    // 始终尝试播放（paused 状态时 play() 才会启动；已经播放时 noop）
    const p = bgmAudio.play();
    if (p && p.catch) p.catch(err => console.warn('[BGM] play rejected:', err.message));
  } catch(e) { console.warn('[BGM] err:', e.message); }
}
function updateBGMVolume() {
  try {
    if (bgmAudio) bgmAudio.volume = musicVolume * BGM_VOL_SCALE;
  } catch(e) { /* 静默 */ }
}
function stopBGM() {
  try {
    if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
  } catch(e) { /* 静默 */ }
}

function loadLevel(id) {
  const lv = LEVELS[id]; if (!lv) return;
  document.getElementById('msg').style.opacity = '0'; // 清除旧消息
  GROUNDS = lv.grounds.map(o => ({x:o.x-8, y:o.y, w:o.w+16, h:o.h, type:'ground'})); // 碰撞区扩8px防边缘漏缝
  PLATFORMS = lv.platforms.map(o => ({...o, type:'platform'}));
  SPIKES = lv.spikes.map(o => ({...o}));
  COINS = lv.coins.map(o => ({...o}));
  MONSTERS = (lv.monsters || []).map(o => ({...o, alive:true, squashT:0, dir:-1, attackCD:180+Math.floor(Math.random()*80)}));
  FLAG = {...lv.flag};
  LEVEL_W = lv.width;
  currentLevel = id;
  const tag = document.getElementById('level-tag');
  if (tag) tag.textContent = '第 ' + id + ' 关';
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
  cameraX = 0; lives = 3; coinsCollected = 0; deaths = 0; levelTimer = 0; monsterKills = 0;
  gameState = 'playing';
  setBodyState();
}

/* ============================================
 * 输入
 * ============================================ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  e.preventDefault();
  syncKeyHud(e.code, true);
  // 首次按键时初始化音频 + 启动 BGM
  initAudio();
  // 任意按键都尝试启动/恢复 BGM（被自动播放策略挡住时会在交互后再试）
  playBGM();

  // === ESC 打开/关闭设置面板 ===
  if (e.code === 'Escape') {
    if (gameState === 'settings') {
      closeSettings(); // 关闭 → 回到原状态
    } else if (gameState === 'audiosettings') {
      closeAudioSettings(); // 关闭声音设置
    } else if (gameState === 'playing' || gameState === 'dead' || gameState === 'win') {
      openSettings();  // 打开
    }
    return;
  }
  // === 设置面板内的导航 ===
  if (gameState === 'settings') {
    if (e.code === 'ArrowUp')   { settingsSelection = (settingsSelection + 2) % 3; updateSettingsSel(); sfxClick(); return; }
    if (e.code === 'ArrowDown') { settingsSelection = (settingsSelection + 1) % 3; updateSettingsSel(); sfxClick(); return; }
    if (e.code === 'Enter' || e.code === 'Space') { sfxConfirm(); handleSettingsAct(settingsActs[settingsSelection]); return; }
    if (e.code === 'Digit1') { sfxConfirm(); handleSettingsAct('resume'); return; }
    if (e.code === 'Digit2') { sfxConfirm(); handleSettingsAct('restart'); return; }
    if (e.code === 'Digit3') { sfxConfirm(); handleSettingsAct('menu'); return; }
    return; // 设置面板打开时其他键屏蔽
  }

  // 菜单控制：主菜单模式（START/SETTINGS）或 选关模式
  if (gameState === 'menu') {
    if (menuMode === 'main') {
      // 主菜单：↑↓ 切换按钮（上下排列），Enter 确认
      if (e.code === 'ArrowUp' || e.code === 'KeyW') { if (menuBtnSel !== 0) { menuBtnSel = 0; sfxClick(); } return; }
      if (e.code === 'ArrowDown' || e.code === 'KeyS') { if (menuBtnSel !== 1) { menuBtnSel = 1; sfxClick(); } return; }
      if (e.code === 'Tab') { menuBtnSel = 1 - menuBtnSel; sfxClick(); return; }
      if (e.code === 'Enter' || e.code === 'Space') {
        sfxConfirm();
        if (menuBtnSel === 0) {
          // START → 进入选关
          menuMode = 'level';
          menuSelection = 1;
        } else {
          // SETTINGS → 打开声音设置
          openAudioSettings();
        }
        return;
      }
      return;
    }
    // 选关模式
    if (e.code === 'Digit1' || e.code === 'Numpad1') { sfxConfirm(); loadLevel(1); playBGM(); return; }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { sfxConfirm(); loadLevel(2); playBGM(); return; }
    if (e.code === 'Digit3' || e.code === 'Numpad3') { sfxConfirm(); loadLevel(3); playBGM(); return; }
    if (e.code === 'Digit4' || e.code === 'Numpad4') { sfxConfirm(); loadLevel(4); playBGM(); return; }
    if (e.code === 'Digit5' || e.code === 'Numpad5') { sfxConfirm(); loadLevel(5); playBGM(); return; }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') { menuSelection = menuSelection>1 ? menuSelection-1 : totalLevels; sfxClick(); return; }
    if (e.code === 'ArrowRight' || e.code === 'ArrowDown') { menuSelection = menuSelection<totalLevels ? menuSelection+1 : 1; sfxClick(); return; }
    if (e.code === 'Tab') { charSelect = (charSelect+1)%4; sfxClick(); return; }
    if (e.code === 'Backspace') { menuMode = 'main'; sfxBack(); return; }
    if (e.code === 'Enter' || e.code === 'Space') { sfxConfirm(); loadLevel(menuSelection); playBGM(); return; }
  }
  // 胜利菜单控制
  if (gameState === 'win') {
    if (e.code === 'Enter' || e.code === 'Space') {
      sfxConfirm();
      if (currentLevel < Object.keys(LEVELS).length) { loadLevel(currentLevel+1); return; }
    }
    if (e.code === 'Backspace') { sfxBack(); gameState = 'menu'; setBodyState(); document.getElementById('msg').style.opacity = '0'; return; }
  }
  if (e.code === 'KeyR' && (gameState === 'dead' || gameState === 'gameover')) resetLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); syncKeyHud(e.code, false); });

/* ============================================
 * 设置面板
 * ============================================ */
const settingsActs = ['resume', 'restart', 'menu'];
function openSettings() {
  prevGameState = gameState;
  gameState = 'settings';
  settingsSelection = 0;
  setBodyState();
  // 清除可能残留的内联 display 样式，让 CSS class 生效
  const panel = document.getElementById('settings-panel');
  if (panel) panel.style.display = '';
  updateSettingsSel();
}
function closeSettings() {
  // 默认回到打开设置前的状态
  gameState = prevGameState || 'playing';
  prevGameState = '';
  setBodyState();
  // 清除可能残留的内联 display 样式，让 CSS class 生效
  const panel = document.getElementById('settings-panel');
  if (panel) panel.style.display = '';
  document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
}
function handleSettingsAct(act) {
  if (act === 'resume') {
    closeSettings();
  } else if (act === 'restart') {
    // 重新开始本关：完全重置
    gameState = 'playing'; // 临时先切走，避免 loadLevel 内的死路
    prevGameState = '';
    setBodyState();
    const panel = document.getElementById('settings-panel');
    if (panel) panel.style.display = '';
    document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
    resetLevel();
  } else if (act === 'menu') {
    // 回到主页菜单
    gameState = 'menu';
    menuMode = 'main';
    prevGameState = '';
    setBodyState();
    // 清理内联 display，让 CSS class 控制显隐
    const panel = document.getElementById('settings-panel');
    if (panel) panel.style.display = '';
    document.querySelectorAll('#settings-panel .opt').forEach(b => b.classList.remove('sel'));
    // 重置玩家到初始位置以免下次进游戏位置错乱
    player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
    player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
    // 重置安全位置/相机
    lastSafeX = 60; lastSafeY = GROUND_Y - CHAR_H - 10;
    cameraX = 0;
    // 清除残留子弹粒子
    particles = particles.filter(p => !p.isBullet && !p.isPlayerBullet);
    // 不重置关卡进度（用户可重新选关）
    document.getElementById('msg').style.opacity = '0';
    // 清除所有按键状态，防止菜单中按着的键影响下次进入游戏
    for (const k in keys) { if (keys[k]) syncKeyHud(k, false); keys[k] = false; }
  }
}
function updateSettingsSel() {
  const btns = document.querySelectorAll('#settings-panel .opt');
  btns.forEach((b, i) => b.classList.toggle('sel', i === settingsSelection));
}
// 绑定鼠标点击
document.querySelectorAll('#settings-panel .opt').forEach((btn, idx) => {
  btn.addEventListener('mouseenter', () => sfxClick());
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    sfxConfirm();
    settingsSelection = idx;
    handleSettingsAct(btn.dataset.act);
  });
});

  const bgm = document.getElementById('bgm-vol');

  if (bgm) bgm.value = Math.round(musicVolume * 100);
  if (sfx) sfx.value = Math.round(sfxVolume * 100);
  const bgmVal = document.getElementById('bgm-vol-val');
  const sfxVal = document.getElementById('sfx-vol-val');
  if (bgmVal) bgmVal.textContent = Math.round(musicVolume * 100) + '%';
  if (sfxVal) sfxVal.textContent = Math.round(sfxVolume * 100) + '%';
}

/* ============================================
 * 碰撞检测
 * ============================================ */
function rectCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function collectCoin(coin) {
  const idx = COINS.indexOf(coin);
  if (idx >= 0) { COINS.splice(idx,1); coinsCollected++; }
}

/* ============================================
 * 粒子
 * ============================================ */
function spawnParticles(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:30+Math.random()*30, size:2+Math.random()*3, color});
  }
}

/* ============================================
 * 更新
 * ============================================ */
function update() {
  try {
  // 设置面板打开时：完全暂停（不计时、不更新物理）
  if (gameState === 'settings') return;
  if (gameState === 'audiosettings') return;
  if (gameState === 'playing') levelTimer++;
  if (gameState === 'menu') {
    if (keys['Enter']) { keys['Enter'] = false; }
    return;
  }
  if (gameState === 'win') { winTimer++; if (winTimer>300) { gameState='menu'; document.getElementById('msg').style.opacity='0'; } return; }
  if (gameState === 'gameover') return;
  // 'dead' 状态：暂停 60 帧后自动复活到原位
  if (gameState === 'dead') {
    deadTimer--;
    if (deadTimer <= 0) {
      // 复活：玩家回到最近的安全位置
      player.x = lastSafeX;
      player.y = lastSafeY;
      player.vy = 0; player.vx = 0;
      player.jumpsUsed = 0;
      invincibleTimer = 90;
      gameState = 'playing';
      setBodyState();
      document.getElementById('msg').style.opacity = '0';
    }
    return;
  }

  /* ==========================================
   * 操作处理
   * ========================================== */

  // === P1: A/D 水平移动 ===
  const p1Left = keys['KeyA'], p1Right = keys['KeyD'];
  if (dashTimer <= 0) {
    const airControl = player.onGround ? 1 : 0.5; // 空中操控减半
    player.vx = 0;
    if (p1Left)  player.vx = -MOVE_SPEED * airControl;
    if (p1Right) player.vx = MOVE_SPEED * airControl;
  }

  /* === P2: ↑ 跳跃（仅地面） === */
  if (keys['ArrowUp'] && player.onGround && !p2JumpHeld) {
    player.vy = JUMP_V;
    player.onGround = false;
    player.jumpsUsed = 1;
    djWindow = DJ_WINDOW;
    p2JumpHeld = true;
    sfxJump();
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#5bf', 10);
  }
  if (!keys['ArrowUp']) p2JumpHeld = false;

  /* === 二段跳：P2起跳后时间窗内 P1按W === */
  if (djWindow > 0) djWindow--;
  if (keys['KeyW'] && !player.onGround && djWindow > 0 && player.jumpsUsed < player.maxJumps) {
    keys['KeyW'] = false;
    player.vy = DOUBLE_JUMP_V;
    player.jumpsUsed++;
    djWindow = 0;
    sfxJump();
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fff', 20);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#fd0', 16);
    spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H, '#8cf', 12);
  }

  /* === 冲刺：P1按A/D开启就绪窗 → P2在窗内按同方向箭头触发 === */
  // 就绪窗倒计时
  if (dashReadyL > 0) dashReadyL--;
  if (dashReadyR > 0) dashReadyR--;

  // P1按下A或D时开启对应就绪窗
  if (p1Left  && !keys._prevKeyA) dashReadyL = DASH_WINDOW;
  if (p1Right && !keys._prevKeyD) dashReadyR = DASH_WINDOW;
  keys._prevKeyA = p1Left;
  keys._prevKeyD = p1Right;

  if (dashTimer > 0) {
    dashTimer--;
    player.vx = dashDir * DASH_SPEED;
    invincibleTimer = 3;
  } else if (dashCooldown > 0) {
    dashCooldown--;
  } else {
    // 就绪窗内+P2按同方向箭头 → 触发冲刺
    const dashL = keys['ArrowLeft']  && dashReadyL > 0 && !keys._prevArrowLeft;
    const dashR = keys['ArrowRight'] && dashReadyR > 0 && !keys._prevArrowRight;
    // 同时保留原始同步检测（两人刚好同时按下）
    const syncL = keys['ArrowLeft']  && p1Left  && !keys._prevArrowLeft;
    const syncR = keys['ArrowRight'] && p1Right && !keys._prevArrowRight;
    if (dashL || syncL) {
      dashTimer = DASH_DURATION; dashDir = -1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyL = 0;
      sfxDash();
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
    }
    if (dashR || syncR) {
      dashTimer = DASH_DURATION; dashDir = 1; dashCooldown = DASH_COOLDOWN;
      invincibleTimer = DASH_DURATION + 3; dashReadyR = 0;
      sfxDash();
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 16);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#8cf', 10);
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 8);
    }
  }
  keys._prevArrowLeft  = keys['ArrowLeft'];
  keys._prevArrowRight = keys['ArrowRight'];

  /* === P2: ↓ 射击 === */
  if (keys['ArrowDown'] && !keys._shotFired) {
    keys._shotFired = true;
    const bulletDir = player.dir || 1;
    const bx = player.x + CHAR_W/2 + bulletDir*10;
    const by = player.y + CHAR_H/2;
    particles.push({x:bx, y:by, vx:bulletDir*BULLET_SPEED, vy:0, life:60, size:4, color:'#ff0', isPlayerBullet:true, isBullet:true});
    sfxShoot();
  }
  if (!keys['ArrowDown']) keys._shotFired = false;

  /* === 无敌帧倒计时 === */
  if (invincibleTimer > 0) invincibleTimer--;

  /* ---- 物理 ---- */
  player.vy += GRAVITY;
  if (player.vy > 15) player.vy = 15;
  player.x += player.vx;
  player.y += player.vy;

  // 边界
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - CHAR_W) player.x = LEVEL_W - CHAR_W;

  /* ---- 碰撞 ---- */
  const prevBottom = player.y + CHAR_H - player.vy;
  const pcx = player.x + CHAR_W / 2;
  const halfW = CHAR_W * 0.4; // 判定宽度：中心±40%，大半悬空即掉落
  player.onGround = false;
  const allSolids = [...GROUNDS, ...PLATFORMS];
  for (const s of allSolids) {
    if (pcx + halfW <= s.x || pcx - halfW >= s.x + s.w) continue;
    if (player.y+CHAR_H <= s.y || player.y >= s.y+s.h) continue;

    if (player.vy >= 0) { // 下落
      // 只有脚之前在上面才站上去（防侧面吸上去）
      if (prevBottom > s.y + s.h) continue;
      player.y = s.y - CHAR_H;
      player.vy = 0;
      player.onGround = true;
      player.jumpsUsed = 0;
    } else { // 上升→撞头
      player.y = s.y + s.h;
      player.vy = 0;
    }
  }

  // X轴碰撞（不和地面做X碰撞，只和墙壁/平台侧面）
  for (const s of PLATFORMS) {
    if (player.y+CHAR_H <= s.y+4 || player.y >= s.y+s.h-4) continue; // Y轴未对齐
    if (player.x+CHAR_W <= s.x || player.x >= s.x+s.w) continue;
    if (player.vx > 0) player.x = s.x - CHAR_W;
    else if (player.vx < 0) player.x = s.x + s.w;
    // 冲刺中撞墙：立即停止冲刺，防止反复推回→卡下悬崖
    if (dashTimer > 0) {
      dashTimer = 0;
      sfxBump();
      spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#fff', 8);
    }
  }

  /* ---- 记录安全位置 ---- */
  if (player.onGround) { lastSafeX = player.x; lastSafeY = player.y; }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    if (pcx + 6 > s.x && pcx - 6 < s.x + s.w &&
        player.y + CHAR_H > s.y && player.y < s.y + s.h &&
        invincibleTimer <= 0) {
      die(false);
      break;
    }
  }

  /* ---- 掉出屏幕 ---- */
  if (player.y > CANVAS_H + 80 && invincibleTimer <= 0) die(true);

  /* ---- 金币 ---- */
  for (let i = COINS.length-1; i >= 0; i--) {
    const c = COINS[i];
    const cr = {x:c.x-8, y:c.y-8, w:16, h:16};
    if (rectCollide(player, cr)) { COINS.splice(i,1); coinsCollected++; sfxCoin(); }
  }

  /* ---- 终点旗帜 ---- */
  if (rectCollide(player, FLAG)) {
    gameState = 'win';
    setBodyState();
    winTimer = 0;
    sfxWin();
    const seconds = Math.floor(levelTimer / 60);
    const timeBonus = Math.max(0, 500 - seconds * 5);
    const coinBonus = coinsCollected * 50;
    const deathPenalty = deaths * 200;
    const killBonus = monsterKills * 300;
    finalScore = 1000 + timeBonus + coinBonus + killBonus - deathPenalty;
    if (finalScore < 0) finalScore = 0;
    // 更新最高分
    const prev = highScores[currentLevel] || 0;
    if (finalScore > prev) { highScores[currentLevel] = finalScore; localStorage.setItem('duoRunnerHighScores', JSON.stringify(highScores)); }
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    showMsg('🎉 通关！ 得分: '+finalScore+'\n⏱ '+seconds+'s  🪙 '+coinsCollected+'  👾 '+monsterKills+'  💀 '+deaths+
      '\n'+(hasNext?'Enter 下一关  ·  Backspace 回菜单':'Backspace 回菜单'), false);
  }

  /* ---- 相机 ---- */
  cameraX = player.x - CANVAS_W/3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_W - CANVAS_W) cameraX = LEVEL_W - CANVAS_W;

  /* ---- 子弹命中怪兽 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isPlayerBullet) continue;
    for (const m of MONSTERS) {
      if (!m.alive) continue;
      if (b.x > m.x && b.x < m.x+MONSTER_W && b.y > m.y && b.y < m.y+MONSTER_H) {
        m.alive = false; m.squashT = 40;
        monsterKills++;
        particles.splice(i,1);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#7c3aed', 14);
        spawnParticles(m.x+MONSTER_W/2, m.y+MONSTER_H/2, '#fff', 6);
        break;
      }
    }
  }

  /* ---- 怪物更新（平台巡逻） ---- */
  for (const m of MONSTERS) {
    if (!m.alive) { if (m.squashT > 0) m.squashT--; continue; }
    // 初始化：找到怪物脚下的平台，设置巡逻边界
    if (!m._init) { m._init = true; m.patrolDir = 1;
      for (const g of [...GROUNDS, ...PLATFORMS]) {
        if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
            m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) {
          m.patrolL = g.x + 8; m.patrolR = g.x+g.w - MONSTER_W - 8; break;
        }
      }
      if (!m.patrolL) { m.patrolL = m.x - 60; m.patrolR = m.x + 60; }
    }
    // 巡逻移动
    m.x += m.patrolDir * 1.5; m.dir = m.patrolDir;
    // 到达边界→转向
    if (m.x <= m.patrolL || m.x >= m.patrolR) m.patrolDir *= -1;
    // 确保脚在平台上（边缘检测兜底）
    let onPlat = false;
    for (const g of [...GROUNDS, ...PLATFORMS]) {
      if (m.x+MONSTER_W/2 > g.x && m.x+MONSTER_W/2 < g.x+g.w &&
          m.y+MONSTER_H >= g.y && m.y+MONSTER_H <= g.y+16) { onPlat = true; break; }
    }
    if (!onPlat) m.patrolDir *= -1;

    // 攻击CD（发现玩家在视野内时射击）
    const dx = player.x - m.x;
    m.attackCD--;
    if (m.attackCD <= 0 && Math.abs(dx) < 400) {
      m.attackCD = 180 + Math.floor(Math.random()*80);
      const bDir = dx > 0 ? 1 : -1;
      particles.push({x:m.x+MONSTER_W/2, y:m.y+MONSTER_H/2, vx:bDir*ENEMY_BULLET_SPEED, vy:0, life:120, size:5, color:'#f44', isBullet:true});
    }
    // 碰撞玩家
    if (player.x+CHAR_W > m.x && player.x < m.x+MONSTER_W &&
        player.y+CHAR_H > m.y && player.y < m.y+MONSTER_H && invincibleTimer <= 0) {
      die(false);
    }
  }

  /* ---- 弹幕碰撞玩家（仅敌方子弹） ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const b = particles[i];
    if (!b.isBullet || b.isPlayerBullet) continue;
    if (player.x+CHAR_W > b.x-4 && player.x < b.x+4 &&
        player.y+CHAR_H > b.y-4 && player.y < b.y+4 && invincibleTimer <= 0) {
      particles.splice(i,1);
      die(false);
    }
  }

  /* ---- 粒子 ---- */
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (!p.isBullet && !p.isPlayerBullet) p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  /* ---- HUD ---- */
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coinsCollected;
  } catch(e) { window._err = e.message; gameState = 'menu'; }
}

let lastSafeX = 60, lastSafeY = GROUND_Y - CHAR_H - 10;
let msgStayTimer = null;

function die(fromFall) {
  if (gameState !== 'playing') return;
  sfxDie();
  lives--; deaths++;
  spawnParticles(player.x+CHAR_W/2, player.y+CHAR_H/2, '#f44', 30);
  document.getElementById('lives').textContent = lives;
  // 非掉落死亡：在死亡位置附近找安全复活点，防止闪现回远处
  if (!fromFall) {
    for (const g of GROUNDS) {
      if (player.x + CHAR_W/2 > g.x && player.x + CHAR_W/2 < g.x + g.w) {
        lastSafeX = Math.max(g.x + 4, player.x - 60);
        lastSafeY = g.y - CHAR_H;
        break;
      }
    }
  }

  if (lives <= 0) {
    // 生命耗尽：纯 JS 重置当前关卡（不 reload，避免 BGM/最高分被清）
    showMsg('💀 生命耗尽！\n按 R 重新开始本关', false);
    setTimeout(() => {
      if (gameState === 'gameover') resetLevel();
    }, 1200);
    gameState = 'gameover';
    setBodyState();
  } else {
    // 进入 'dead' 状态：暂停 60 帧（约 1 秒），期间玩家无敌
    // 此期间可以按 R 立即重置本关，否则自动复活继续
    player.vy = 0; player.vx = 0;
    player.jumpsUsed = 0;
    invincibleTimer = 120;
    gameState = 'dead';
    setBodyState();
    deadTimer = 60;
    document.getElementById('msg').style.opacity = '1';
    document.getElementById('msg').innerHTML = '💔 -1  ·  按 R 重置';
    msgStayTimer = setTimeout(() => {
      if (gameState === 'dead') document.getElementById('msg').style.opacity = '0';
    }, 1000);
  }
}

function resetLevel() {
  // 纯 JS 重置当前关卡（避免 location.reload 丢失 BGM/最高分）
  const lv = LEVELS[currentLevel]; if (!lv) return;
  document.getElementById('msg').style.opacity = '0';
  GROUNDS = lv.grounds.map(o => ({...o, type:'ground'}));
  PLATFORMS = lv.platforms.map(o => ({...o, type:'platform'}));
  SPIKES = lv.spikes.map(o => ({...o}));
  COINS = lv.coins.map(o => ({...o}));
  MONSTERS = (lv.monsters || []).map(o => ({...o, alive:true, squashT:0, dir:-1, attackCD:180+Math.floor(Math.random()*80)}));
  FLAG = {...lv.flag};
  LEVEL_W = lv.width;
  // 清掉残留子弹粒子（玩家 & 敌方）
  particles = particles.filter(p => !p.isBullet && !p.isPlayerBullet);
  // 重置玩家
  player.x = 60; player.y = GROUND_Y - CHAR_H - 10;
  player.vx = 0; player.vy = 0; player.jumpsUsed = 0; player.onGround = false;
  // 重置关卡统计
  lives = 3; coinsCollected = 0; deaths = 0; levelTimer = 0; monsterKills = 0;
  // 重置冲刺/无敌等瞬时状态
  dashTimer = 0; dashCooldown = 0; dashDir = 0;
  dashReadyL = 0; dashReadyR = 0;
  djWindow = 0; p2JumpHeld = false;
  invincibleTimer = 0; deadTimer = 0; winTimer = 0;
  cameraX = 0;
  lastSafeX = 60; lastSafeY = GROUND_Y - CHAR_H - 10;
  if (msgStayTimer) { clearTimeout(msgStayTimer); msgStayTimer = null; }
  // 清除 R 键状态，防止按住 R 反复触发
  keys['KeyR'] = false;
  syncKeyHud('KeyR', false);
  gameState = 'playing';
  setBodyState();
  showMsg('已重置本关');
}

/**
 * 用统一的精灵系统绘制一个角色（17×17 像素，PS=2 缩放，脚底 = py + 38）
 * @param {number} px  左上角 x
 * @param {number} py  左上角 y（脚底 = py+38，so py = GROUND_Y - 38 可让脚贴地）
 * @param {number} charIdx  角色索引 0=男 1=女 2=猫 3=机器人
 * @param {boolean} flipX  是否水平翻转
 * @param {boolean} inAir  true=空中帧（腿分开）false=站立帧（腿并拢）
 */
function drawCharSprite(px, py, charIdx, flipX, inAir) {
  const sp = ALL_SPRITES[charIdx] || ALL_SPRITES[0];
  const sprite = inAir ? sp.air : sp.stand;
  for (let sy=0; sy<sprite.length; sy++) {
    for (let sx=0; sx<sprite[sy].length; sx++) {
      const ci = sprite[sy][sx], c = C[parseInt(ci,36)];
      if (!c) continue;
      ctx.fillStyle = c;
      const dx = flipX ? (CHAR_W - (sx+1)*PS) : sx*PS;
      ctx.fillRect(px+dx, py+4+sy*PS, PS, PS);
    }
  }
}

/* ============================================
 * 渲染
 * ============================================ */
function draw() {
  ctx.globalAlpha = 1; // 每帧强制重置，防闪现
  // 通关画面
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#fd0'; ctx.font = 'bold 40px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 完美配合！', CANVAS_W/2, 180);
    ctx.fillText('通关成功！', CANVAS_W/2, 230);
    ctx.fillStyle = '#fff'; ctx.font = '16px -apple-system';
    const hasNext = currentLevel < Object.keys(LEVELS).length;
    ctx.fillText(hasNext ? 'Enter 下一关  ·  Backspace 回菜单' : 'Backspace 回菜单', CANVAS_W/2, 290);
    ctx.fillText('或等待5秒自动返回', CANVAS_W/2, 320);
    ctx.textAlign = 'left';
    return;
  }
  // 开始菜单（含选关）
  if (gameState === 'menu') {
    // ── 背景：复刻游戏内场景（天空渐变 + 远山 + 地面 + 像素云） ──
    const skyGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
    skyGrad.addColorStop(0, '#4a90d9');
    skyGrad.addColorStop(0.6, '#87ceeb');
    skyGrad.addColorStop(1, '#c8e6c0');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    // 像素云：上下浮动 + 偶发向左轻推一下
    const cloudTime = Date.now() / 1000;
    // 上下浮动：缓慢 sin
    const cloudBobY = Math.sin(cloudTime * 0.6) * 4;
    // 左右轻推：每 4 秒产生一次"风"——1.5 秒内左移 8px 再回弹
    const windPhase = (cloudTime % 4);                    // 0~4 秒
    let windX = 0;
    if (windPhase < 1.5) {
      // 用 sin(0~π) 模拟"先左再回"：0→最大→0
      windX = -8 * Math.sin((windPhase / 1.5) * Math.PI);
    }
    ctx.fillStyle = '#ffffff';
    for (let cx = -100; cx < CANVAS_W + 200; cx += 200) {
      const baseY = 40 + ((cx * 7) % 60);
      const x = cx + windX;
      const y = baseY + cloudBobY + Math.sin(cloudTime * 0.6 + cx * 0.01) * 2;
      ctx.fillRect(x, y, 40, 16);
      ctx.fillRect(x + 12, y - 10, 56, 20);
      ctx.fillRect(x + 24, y - 16, 32, 16);
      ctx.fillRect(x + 44, y - 6, 28, 14);
    }
    // 远山（回到之前的视差漂移）
    const mountainT = Date.now() / 50; // 50ms 走 1 像素
    const mountainOffset = (mountainT % 160); // 160px 周期
    for (let hx = -80 - mountainOffset; hx < CANVAS_W + 160; hx += 160) {
      ctx.fillStyle = '#68b838';
      ctx.beginPath(); ctx.moveTo(hx - 30, GROUND_Y); ctx.lineTo(hx + 20, GROUND_Y - 60); ctx.lineTo(hx + 80, GROUND_Y); ctx.fill();
      ctx.fillStyle = '#58a828';
      ctx.beginPath(); ctx.moveTo(hx + 10, GROUND_Y); ctx.lineTo(hx + 50, GROUND_Y - 40); ctx.lineTo(hx + 70, GROUND_Y); ctx.fill();
    }
    // 地面（砖块）
    ctx.fillStyle = '#c84c30'; ctx.fillRect(0, GROUND_Y, CANVAS_W, 70);
    const brkColors = ['#c84c30', '#b84028', '#a83820'];
    for (let bx = 0; bx < CANVAS_W; bx += 32) {
      for (let by = GROUND_Y; by < GROUND_Y + 70; by += 16) {
        const ci = ((bx / 32) + (by / 16)) % 3;
        ctx.fillStyle = brkColors[Math.abs(Math.round(ci))];
        ctx.fillRect(bx, by, 31, 15);
        ctx.fillStyle = '#d46040'; ctx.fillRect(bx, by, 31, 3);
        ctx.fillStyle = '#903020'; ctx.fillRect(bx, by + 12, 31, 3);
      }
    }
    // 草地顶
    ctx.fillStyle = '#38b838'; ctx.fillRect(0, GROUND_Y, CANVAS_W, 10);
    ctx.fillStyle = '#48d848'; ctx.fillRect(0, GROUND_Y, CANVAS_W, 4);
    for (let gx = 0; gx < CANVAS_W; gx += 8) {
      ctx.fillStyle = (Math.floor(gx / 8) % 2) ? '#48d040' : '#38b030';
      ctx.fillRect(gx + 1, GROUND_Y + 6, 6, 2);
    }

    // ── 标题：纯像素英语 "DOUBLE RUNNER!?" 两行 ──
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const t = Date.now() / 400;
    const bounce = Math.sin(t) * 3;
    const title1 = 'DOUBLE';
    const title2 = 'RUNNER!?';
    const pixel = 6;
    const w1 = pixelTextWidth(title1, pixel);
    const w2 = pixelTextWidth(title2, pixel);
    const totalW = Math.max(w1, w2);
    const x1 = (CANVAS_W - w1) / 2;
    const x2 = (CANVAS_W - w2) / 2;
    const y1 = 95 + bounce;
    const y2 = y1 + 7 * pixel + 6;
    // 1. 黑色硬阴影
    drawPixelText(title1, x1 + 4, y1 + 4, pixel, 'rgba(0,0,0,0.6)');
    drawPixelText(title2, x2 + 4, y2 + 4, pixel, 'rgba(0,0,0,0.6)');
    // 2. 暗红描边
    drawPixelText(title1, x1 - 2, y1 - 2, pixel, '#5a0808');
    drawPixelText(title1, x1 + 2, y1 + 2, pixel, '#5a0808');
    drawPixelText(title2, x2 - 2, y2 - 2, pixel, '#5a0808');
    drawPixelText(title2, x2 + 2, y2 + 2, pixel, '#5a0808');
    // 3. 亮红主体
    drawPixelText(title1, x1, y1, pixel, '#e83030');
    drawPixelText(title2, x2, y2, pixel, '#e83030');
    // 4. 顶部高光
    function drawTopHighlight(text, x, y) {
      const up = String(text).toUpperCase();
      let cx = x;
      for (let i = 0; i < up.length; i++) {
        const glyph = PIXEL_FONT[up[i]] || PIXEL_FONT[' '];
        ctx.fillStyle = 'rgba(255,180,180,0.7)';
        for (let c = 0; c < 5; c++) {
          if (glyph[0][c] === '1') ctx.fillRect(cx + c * pixel, y, pixel, Math.max(1, pixel / 2));
        }
        cx += (5 + 1) * pixel;
      }
    }
    drawTopHighlight(title1, x1, y1);
    drawTopHighlight(title2, x2, y2);
    // 5. 像素小星装饰
    function drawPixelStar(sx, sy, size, color) {
      ctx.fillStyle = color;
      ctx.fillRect(sx + size, sy, size, size);
      ctx.fillRect(sx, sy + size, size * 3, size);
      ctx.fillRect(sx + size, sy + size * 2, size, size);
    }
    drawPixelStar(x1 - 26, y1 + 14, 3, '#fd0');
    drawPixelStar(x1 + w1 + 16, y1 + 14, 3, '#fd0');

    // ── 角色选择器：单显示当前角色 + 上下滚动提示（仅选关模式显示） ──
    // 位置：第 4/5 关上方（黑色框位置）
    const charSelX = 600, charSelY = 168;
    if (menuMode === 'level') {
    const charSize = 36;          // 单个方块更大
    const cx = charSelX;
    const cy = charSelY;
    const i = charSelect;
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    fillRoundRect(cx + 2, cy + 3, charSize, charSize, 6);
    // 主体
    ctx.fillStyle = CHAR_COLORS[i];
    fillRoundRect(cx, cy, charSize, charSize, 6);
    // 像素图标
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    if (i === 0) {
      // 男孩：头+身体
      ctx.fillRect(cx + 12, cy + 7, 12, 12);
      ctx.fillRect(cx + 9, cy + 19, 18, 12);
    } else if (i === 1) {
      // 女孩：头+辫子+裙
      ctx.fillRect(cx + 12, cy + 7, 12, 12);
      ctx.fillRect(cx + 8, cy + 10, 3, 9);
      ctx.fillRect(cx + 25, cy + 10, 3, 9);
      ctx.fillRect(cx + 10, cy + 19, 16, 12);
    } else if (i === 2) {
      // 猫：三角耳+猫脸+身体
      ctx.beginPath(); ctx.moveTo(cx + 7, cy + 9); ctx.lineTo(cx + 12, cy + 2); ctx.lineTo(cx + 17, cy + 9); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 19, cy + 9); ctx.lineTo(cx + 24, cy + 2); ctx.lineTo(cx + 29, cy + 9); ctx.fill();
      ctx.fillRect(cx + 10, cy + 8, 16, 13);
      ctx.fillRect(cx + 8, cy + 20, 20, 11);
    } else {
      // 机器人：天线+方头+方身
      ctx.fillRect(cx + 17, cy + 1, 2, 5);
      ctx.fillRect(cx + 9, cy + 6, 18, 15);
      ctx.fillRect(cx + 6, cy + 22, 24, 10);
      // 眼睛
      ctx.fillStyle = '#fd0';
      ctx.fillRect(cx + 13, cy + 12, 3, 3);
      ctx.fillRect(cx + 20, cy + 12, 3, 3);
    }
    // 选中描边（黄色）
    ctx.strokeStyle = '#fd0'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 6, cy);
    ctx.lineTo(cx + charSize - 6, cy);
    ctx.arcTo(cx + charSize, cy, cx + charSize, cy + 6, 6);
    ctx.lineTo(cx + charSize, cy + charSize - 6);
    ctx.arcTo(cx + charSize, cy + charSize, cx + charSize - 6, cy + charSize, 6);
    ctx.lineTo(cx + 6, cy + charSize);
    ctx.arcTo(cx, cy + charSize, cx, cy + charSize - 6, 6);
    ctx.lineTo(cx, cy + 6);
    ctx.arcTo(cx, cy, cx + 6, cy, 6);
    ctx.closePath();
    ctx.stroke();
    ctx.beginPath();

    // 上方三角箭头（提示可向上滚到上一个）
    const upTriY = cy - 10;
    ctx.fillStyle = Math.floor(Date.now() / 350) % 2 === 0 ? '#fd0' : 'rgba(255,221,0,0.4)';
    ctx.beginPath();
    ctx.moveTo(cx + charSize / 2, upTriY);
    ctx.lineTo(cx + charSize / 2 - 6, upTriY + 6);
    ctx.lineTo(cx + charSize / 2 + 6, upTriY + 6);
    ctx.closePath();
    ctx.fill();
    // 下方三角箭头（提示可向下滚到下一个）
    const downTriY = cy + charSize + 10;
    ctx.fillStyle = Math.floor(Date.now() / 350) % 2 === 0 ? 'rgba(255,221,0,0.4)' : '#fd0';
    ctx.beginPath();
    ctx.moveTo(cx + charSize / 2, downTriY);
    ctx.lineTo(cx + charSize / 2 - 6, downTriY - 6);
    ctx.lineTo(cx + charSize / 2 + 6, downTriY - 6);
    ctx.closePath();
    ctx.fill();

    // 角色名 + Tab 切换提示（方块右侧）
    const hintX = cx + charSize + 12;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // 角色名（统一白色）
    ctx.font = 'bold 16px -apple-system';
    ctx.fillStyle = '#fff';
    ctx.fillText(CHAR_LABELS[charSelect], hintX, cy + charSize / 2 - 6);
    // Tab 提示：键位小方块 + 文字
    const tabKeyX = hintX, tabKeyY = cy + charSize / 2 + 10;
    // 键位小方块
    ctx.fillStyle = '#222';
    ctx.fillRect(tabKeyX, tabKeyY, 22, 14);
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
    ctx.strokeRect(tabKeyX + 0.5, tabKeyY + 0.5, 21, 13);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('Tab', tabKeyX + 11, tabKeyY + 7);
    // "切换"文字
    ctx.textAlign = 'left';
    ctx.font = '11px -apple-system';
    ctx.fillStyle = '#fd0';
    ctx.fillText('切换', tabKeyX + 28, tabKeyY + 7);
    ctx.textBaseline = 'alphabetic';
    } // end if (menuMode === 'level') 角色选择器

    // ── 4 角色原地踏步展示（与关卡内同款精灵，从右到左：男→女→猫→机器人） ──
    const walkX0 = 600;          // 最右角色 x
    const walkGap = 38;          // 间距（精灵宽 34，留 4px 间隔）
    const walkTime = Date.now() / 220;
    for (let k = 0; k < 4; k++) {
      // 从右到左：k=0 在最右（男），k=3 在最左（机器人）
      const wx = walkX0 + (3 - k) * walkGap;
      const charIdx = k;
      // 踏步节奏：交替空中帧/站立帧
      const stepPhase = walkTime + k * 0.5;
      const inAir = Math.sin(stepPhase) > 0;
      // 脚底 = GROUND_Y：精灵底部 = py + 4 + 17*2 = py + 38，所以 py = GROUND_Y - 38（让脚真正贴地）
      const py = GROUND_Y - 38;
      // 阴影（贴在脚底下方 1px，地面之上）
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(wx + CHAR_W/2, GROUND_Y - 1, 12, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // 调用统一精灵（面朝右，不翻转）
      drawCharSprite(wx, py, charIdx, false, inAir);
    }

    // ── 关卡模块：圆角像素风 + 上下浮动（仅在选关模式显示） ──
    const cardW = 130, cardH = 130, cardGap = 18, cardR = 6;
    const totalCardsW = cardW * totalLevels + cardGap * (totalLevels - 1);
    const cardsStartX = (CANVAS_W - totalCardsW) / 2;
    const cardsBaseY = 220;
    if (menuMode === 'main') {
      // ── 主菜单：START 在红框位置（标题正下方），SETTINGS 在绿框位置（START 下方） ──
      // 按钮尺寸与位置
      const btnW = 280, btnH = 44;
      const btnStartX = (CANVAS_W - btnW) / 2;
      const btnY0 = 248; // START 按钮 y（红框 y=240-310 中间）
      const btnY1 = 320; // SETTINGS 按钮 y（绿框 y=320-360 中间）
      const btnYs = [btnY0, btnY1];
      const labels = ['START', 'SETTINGS'];
      const icons  = ['▶', '⚙'];
      for (let bi = 0; bi < 2; bi++) {
        const bx = btnStartX;
        const by = btnYs[bi];
        const sel = (bi === menuBtnSel);
        // 像素卡通风按钮：4 层叠加（黑边框 → 暗色底层 → 主体 → 顶部高光），全部方角无圆角
        // 调色板：马里奥式砖块按钮
        const colOuter = sel ? '#5a3a00' : '#000';           // 外深框
        const colDark  = sel ? '#c80'    : '#1a1a2a';         // 底色 / 选中时的暗边
        const colMain  = sel ? '#fd0'    : '#3a3a4a';         // 主体
        const colHi    = sel ? '#ffe860' : '#5a5a6a';         // 顶部高光
        // 1. 黑色硬阴影（右下偏移 4px）
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(bx + 4, by + 4, btnW, btnH);
        // 2. 外深边框
        ctx.fillStyle = colOuter;
        ctx.fillRect(bx - 2, by - 2, btnW + 4, btnH + 4);
        // 3. 暗色底（底部 4px）
        ctx.fillStyle = colDark;
        ctx.fillRect(bx, by, btnW, btnH);
        // 4. 主体
        ctx.fillStyle = colMain;
        ctx.fillRect(bx, by, btnW, btnH - 6);
        // 5. 顶部高光（顶部 4px，更亮）
        ctx.fillStyle = colHi;
        ctx.fillRect(bx, by, btnW, 4);
        // 6. 左右内嵌阴影（各 2px）
        ctx.fillStyle = colDark;
        ctx.fillRect(bx, by, 2, btnH);
        ctx.fillRect(bx + btnW - 2, by, 2, btnH);
        // 7. 像素铆钉（左上 + 右下）
        ctx.fillStyle = colOuter;
        ctx.fillRect(bx + 2, by + 2, 2, 2);
        ctx.fillRect(bx + btnW - 4, by + btnH - 4, 2, 2);
        // 8. 选中时整体加亮 + 4 角闪光
        if (sel) {
          // 4 角闪烁小方块
          const blink = Math.floor(Date.now() / 250) % 2 === 0;
          if (blink) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(bx - 4, by - 4, 3, 3);
            ctx.fillRect(bx + btnW + 1, by - 4, 3, 3);
            ctx.fillRect(bx - 4, by + btnH + 1, 3, 3);
            ctx.fillRect(bx + btnW + 1, by + btnH + 1, 3, 3);
          }
        }
        // 文字（用普通字体，按钮放大后字号也加大）
        const text = labels[bi];
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = sel ? '#000' : '#fff';
        // 图标和文字：分两段绘制，确保居中
        const iconStr = icons[bi] || '';
        const textStr = text;
        ctx.font = 'bold 18px -apple-system';
        const iconW = ctx.measureText(iconStr).width;
        ctx.font = 'bold 20px -apple-system';
        const txtW = ctx.measureText(textStr).width;
        const gap2 = 10;
        const totalStrW = iconW + gap2 + txtW;
        const strStartX = bx + (btnW - totalStrW) / 2;
        ctx.font = 'bold 18px -apple-system';
        ctx.fillText(iconStr, strStartX + iconW / 2, by + btnH / 2 - 2);
        ctx.font = 'bold 20px -apple-system';
        ctx.fillText(textStr, strStartX + iconW + gap2 + txtW / 2, by + btnH / 2 - 2);
      }
      // 提示文字
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '11px -apple-system';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('↑ ↓ 切换  ·  Enter 确认', CANVAS_W / 2, btnY1 + btnH + 14);
    } else {
      // 选关模式提示（统一由下方底部操作提示绘制，避免重复）
    }
    // 不同关卡用不同色调
    const levelColors = [
      ['#5b9ee0', '#3b7ec0'], // 1 教学 - 蓝
      ['#7c3aed', '#5b21b6'], // 2 挑战 - 紫
      ['#e44',    '#a02020'], // 3 极限 - 红
      ['#38b838', '#1a7a1a'], // 4 猎魔 - 绿
      ['#fb5',    '#c80'],    // 5 最终 - 橙
    ];
    // 圆角像素矩形（4 角各去掉 cardR 范围内的像素）
    // 像素风圆角矩形：用 beginPath + arcTo 画出 4 角圆弧，单次 fill
    function fillRoundRect(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      if (r <= 0) { ctx.fillRect(x, y, w, h); return; }
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
      ctx.fill();
    }
    for (let i = 1; i <= totalLevels; i++) {
      if (menuMode !== 'level') break; // 主菜单不渲染关卡卡片
      const x = cardsStartX + (i - 1) * (cardW + cardGap);
      // 上下浮动：每个关卡相位错开，更动感
      const phase = i * 0.6;
      const floatY = Math.sin(t * 0.8 + phase) * 4;
      const y = cardsBaseY + floatY;
      const sel = i === menuSelection;
      const [c1, c2] = levelColors[(i - 1) % levelColors.length];
      const hs = highScores[i] || 0;
      // 阴影（圆角）
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      fillRoundRect(x + 4, y + 5, cardW, cardH, cardR);
      // 主体渐变（圆角）
      const grad = ctx.createLinearGradient(x, y, x, y + cardH);
      grad.addColorStop(0, c1); grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      fillRoundRect(x, y, cardW, cardH, cardR);
      // 顶部高光（圆角）
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      fillRoundRect(x, y, cardW, 8, cardR);
      // 内部像素纹理
      for (let px = x + 4; px < x + cardW - 4; px += 8) {
        for (let py = y + 10; py < y + cardH - 4; py += 8) {
          if (((px + py) / 8) % 2 < 0.5) {
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(px, py, 7, 7);
          }
        }
      }
      // 选中时金色加粗外框（独立 beginPath，避免 fillRoundRect 残留路径影响 stroke）
      if (sel) {
        ctx.strokeStyle = '#fd0'; ctx.lineWidth = 4;
        ctx.beginPath();
        const ox = x - 3, oy = y - 3, ow = cardW + 6, oh = cardH + 6, orad = cardR + 1;
        ctx.moveTo(ox + orad, oy);
        ctx.lineTo(ox + ow - orad, oy);
        ctx.arcTo(ox + ow, oy, ox + ow, oy + orad, orad);
        ctx.lineTo(ox + ow, oy + oh - orad);
        ctx.arcTo(ox + ow, oy + oh, ox + ow - orad, oy + oh, orad);
        ctx.lineTo(ox + orad, oy + oh);
        ctx.arcTo(ox, oy + oh, ox, oy + oh - orad, orad);
        ctx.lineTo(ox, oy + orad);
        ctx.arcTo(ox, oy, ox + orad, oy, orad);
        ctx.closePath();
        ctx.stroke();
        ctx.beginPath(); // 显式重置路径，避免污染下一帧
        // 闪烁指示
        if (Math.floor(Date.now() / 400) % 2 === 0) {
          ctx.fillStyle = '#fd0';
          ctx.fillRect(x + cardW - 10, y + 2, 6, 6);
        }
      }
      // 关卡序号
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // "第 N 关" 标签
      ctx.font = 'bold 12px -apple-system';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('第 ' + i + ' 关', x + cardW / 2, y + 22);
      // 大数字（用像素字 "1" "2" "3" "4" "5"）
      const numStr = String(i);
      const numPixel = 5;
      const numW = pixelTextWidth(numStr, numPixel);
      const numX = x + (cardW - numW) / 2;
      const numY = y + 38;
      drawPixelText(numStr, numX + 2, numY + 2, numPixel, 'rgba(0,0,0,0.5)');
      drawPixelText(numStr, numX, numY, numPixel, '#fff');
      // 分隔线
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(x + 14, y + 78, cardW - 28, 1);
      // 最高分
      ctx.font = 'bold 18px -apple-system';
      ctx.fillStyle = hs > 0 ? '#fd0' : 'rgba(255,255,255,0.5)';
      ctx.fillText(hs > 0 ? hs : '— —', x + cardW / 2, y + 96);
      // 标签
      ctx.font = '9px -apple-system';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(hs > 0 ? 'HIGH SCORE' : 'NO RECORD', x + cardW / 2, y + 114);
    }
    ctx.textBaseline = 'alphabetic';

    // ── 底部操作提示 ──
    ctx.font = '13px -apple-system'; ctx.fillStyle = '#ff0';
    // 提示位置：放在关卡卡片和踏步角色之间（卡片 y=350 底，踏步 y=388 顶），用 y=370
    const hintY = cardsBaseY + cardH + 20;
    if (menuMode === 'level') {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff'; ctx.font = '12px -apple-system';
      ctx.fillText('← ↑ ↓ → 选关  ·  Enter 进入  ·  1-'+totalLevels+' 快速选关  ·  Backspace 返回', CANVAS_W/2, hintY);
    }
    if (window._err) { ctx.fillStyle='#f44'; ctx.font='12px monospace'; ctx.fillText('错误: '+window._err, CANVAS_W/2, hintY+20); }
    ctx.textAlign = 'left'; return;
  }

  ctx.save();
  ctx.translate(-cameraX, 0);

  /* ---- 天空 ---- */
  ctx.fillStyle = '#5c94fc'; ctx.fillRect(cameraX, 0, CANVAS_W, CANVAS_H);
  // 像素云
  ctx.fillStyle = '#ffffff';
  for (let cx = (cameraX-cameraX%200)-100; cx < cameraX+CANVAS_W+200; cx += 200) {
    const cy = 40 + ((cx*7)%60);
    ctx.fillRect(cx,cy,40,16); ctx.fillRect(cx+12,cy-10,56,20); ctx.fillRect(cx+24,cy-16,32,16);
    ctx.fillRect(cx+44,cy-6,28,14);
  }
  // 远山
  for (let hx = (cameraX-cameraX%160)-80; hx < cameraX+CANVAS_W+160; hx += 160) {
    ctx.fillStyle = '#68b838';
    ctx.beginPath(); ctx.moveTo(hx-30,GROUND_Y); ctx.lineTo(hx+20,GROUND_Y-60); ctx.lineTo(hx+80,GROUND_Y); ctx.fill();
    ctx.fillStyle = '#58a828';
    ctx.beginPath(); ctx.moveTo(hx+10,GROUND_Y); ctx.lineTo(hx+50,GROUND_Y-40); ctx.lineTo(hx+70,GROUND_Y); ctx.fill();
  }

  /* ---- 地面（像素砖块） ---- */
  const brkColors = ['#c84c30','#b84028','#a83820'];
  for (const g of GROUNDS) {
    // 泥土
    ctx.fillStyle = '#c84c30'; ctx.fillRect(g.x, g.y, g.w, g.h);
    // 砖块纹理
    for (let bx=g.x; bx<g.x+g.w; bx+=32) {
      for (let by=g.y; by<g.y+g.h; by+=16) {
        const ci = ((bx/32)+(by/16))%3;
        ctx.fillStyle = brkColors[ci];
        ctx.fillRect(bx, by, 31, 15);
        ctx.fillStyle = '#d46040'; ctx.fillRect(bx, by, 31, 3);
        ctx.fillStyle = '#903020'; ctx.fillRect(bx, by+12, 31, 3);
      }
    }
    // 草地顶部
    ctx.fillStyle = '#38b838'; ctx.fillRect(g.x, g.y, g.w, 10);
    ctx.fillStyle = '#48d848'; ctx.fillRect(g.x, g.y, g.w, 4);
    // 草地纹理
    for (let gx=g.x; gx<g.x+g.w; gx+=8) {
      ctx.fillStyle = (Math.floor(gx/8)%2)?'#48d040':'#38b030';
      ctx.fillRect(gx+1, g.y+6, 6, 2);
    }
  }

  /* ---- 平台（像素砖块） ---- */
  for (const p of PLATFORMS) {
    for (let bx=p.x; bx<p.x+p.w; bx+=16) {
      ctx.fillStyle = (Math.floor(bx/16)%2)?'#c84c30':'#d86040';
      ctx.fillRect(bx, p.y, 15, p.h);
      ctx.fillStyle = '#e87850'; ctx.fillRect(bx, p.y, 15, 3);
      ctx.fillStyle = '#903020'; ctx.fillRect(bx, p.y+p.h-3, 15, 3);
      // 砖缝
      ctx.fillStyle = '#1a0808'; ctx.fillRect(bx-1, p.y, 1, p.h); ctx.fillRect(bx-1, p.y+p.h/2, 15, 1);
    }
  }

  /* ---- 尖刺 ---- */
  for (const s of SPIKES) {
    const isPlatSpike = s.onPlatform || false;
    const sy = isPlatSpike ? s.y : s.y;
    for (let sx = s.x; sx < s.x+s.w; sx += 12) {
      ctx.fillStyle = '#e83030';
      ctx.beginPath(); ctx.moveTo(sx, sy+s.h); ctx.lineTo(sx+6, sy); ctx.lineTo(sx+12, sy+s.h); ctx.fill();
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.moveTo(sx+2, sy+s.h); ctx.lineTo(sx+6, sy+2); ctx.lineTo(sx+10, sy+s.h); ctx.fill();
    }
  }

  /* ---- 金币 ---- */
  for (const c of COINS) {
    const bob = Math.sin(Date.now()/300 + c.x) * 2;
    const w = Math.abs(Math.cos(Date.now()/400 + c.x)) * 10 + 4; // 旋转宽度变化
    const cx = c.x, cy = c.y + bob;
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-w/2, cy-5, w, 10);
    ctx.fillStyle = '#ff8'; ctx.fillRect(cx-w/2+2, cy-3, w-4, 6);
    ctx.fillStyle = '#fd0'; ctx.fillRect(cx-3, cy-3, 6, 6); ctx.fillStyle = '#ff8'; ctx.fillRect(cx-2, cy-2, 4, 4);
  }

  /* ---- 终点旗杆 ---- */
  const flagWave = Math.sin(Date.now()/400)*4;
  ctx.fillStyle = '#888'; ctx.fillRect(FLAG.x+4, FLAG.y, 4, FLAG.h);
  ctx.fillStyle = '#48c848'; ctx.fillRect(FLAG.x-2, FLAG.y+4+flagWave, 32, 18);
  ctx.fillStyle = '#fff'; ctx.fillRect(FLAG.x+2, FLAG.y+8+flagWave, 16, 8);
  ctx.fillStyle = '#fd0'; ctx.beginPath(); ctx.arc(FLAG.x+6, FLAG.y, 8, 0, Math.PI*2); ctx.fill();

  /* ---- 怪物 ---- */
  for (const m of MONSTERS) {
    if (!m.alive && m.squashT <= 0) continue;
    const mx=m.x, my=m.y, alpha = m.alive?1:0.5;
    ctx.globalAlpha = alpha;
    // 身体
    ctx.fillStyle = '#7c3aed'; ctx.fillRect(mx+2, my+6, MONSTER_W-4, MONSTER_H-8);
    ctx.fillStyle = '#a78bfa'; ctx.fillRect(mx+4, my+8, MONSTER_W-8, 6);
    // 眼睛
    ctx.fillStyle = '#fff'; ctx.fillRect(mx+6, my+10, 6, 6); ctx.fillRect(mx+MONSTER_W-12, my+10, 6, 6);
    ctx.fillStyle = '#000'; ctx.fillRect(m.dir>0?mx+8:mx+6, my+12, 3, 3); ctx.fillRect(m.dir>0?mx+MONSTER_W-10:mx+MONSTER_W-12, my+12, 3, 3);
    // 脚
    ctx.fillStyle = '#5b21b6'; ctx.fillRect(mx+4, my+MONSTER_H-6, 8, 6); ctx.fillRect(mx+MONSTER_W-12, my+MONSTER_H-6, 8, 6);
    ctx.globalAlpha = 1;
  }

  /* ---- 冲刺残影 ---- */
  if (dashTimer > 0) {
    for (let i=1; i<=3; i++) {
      const ax = player.x - dashDir * i * 12;
      const alpha = 1 - i*0.3;
      ctx.globalAlpha = alpha * 0.4;
      ctx.fillStyle = '#fff'; ctx.fillRect(ax+2, player.y+10, CHAR_W-4, CHAR_H-12);
    }
    ctx.globalAlpha = 1;
  }

  /* ---- 角色（像素精绘） ---- */
  const showChar = gameState !== 'gameover';
  if (invincibleTimer > 0) ctx.globalAlpha = 0.4 + Math.sin(invincibleTimer * 0.5) * 0.2;
  if (showChar) {
    const p = player, px=p.x, py=p.y, inAir=!p.onGround;
    const dir = dashTimer>0 ? dashDir : (p.vx!==0 ? (p.vx>0?1:-1) : (p.dir||1));
    p.dir = dir; const flipX = dir < 0;

    // 冲刺冷却条
    if (dashCooldown > 0) {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px,py-10,CHAR_W,4);
      ctx.fillStyle='#fff'; ctx.fillRect(px,py-10,CHAR_W*(1-dashCooldown/DASH_COOLDOWN),4);
    } else if (dashTimer <= 0) {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(px,py-10,CHAR_W,4);
      ctx.fillStyle='#fb5'; ctx.fillRect(px,py-10,CHAR_W,4);
    }

    // 阴影
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(px+4,py+CHAR_H-2,20,4);

    // 调用统一精灵绘制函数（与菜单展示完全一致）
    drawCharSprite(px, py, charSelect, flipX, inAir);

    // 冲刺速度线
    if (dashTimer>0){ctx.fillStyle='rgba(255,255,255,0.6)';for(let i=0;i<3;i++)ctx.fillRect(flipX?px-10:px+CHAR_W,py+14+i*8,10,3)}
    // 跳跃光圈
    if (!p.onGround&&p.jumpsUsed>=1){ctx.fillStyle='rgba(100,180,255,0.25)';ctx.beginPath();ctx.arc(p.x+CHAR_W/2,p.y+CHAR_H,20,0,Math.PI*2);ctx.fill()}
  }
  ctx.globalAlpha = 1;

  /* ---- 粒子 ---- */
  for (const p of particles) {
    const alpha = Math.min(1, p.life/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const s = p.size || 3;
    ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  /* ---- 屏幕底部按键提示（按键响应可视化） ---- */
  drawKeyHud();

}

/* ============================================
 * 按键 HUD —— 屏幕底部
 * ============================================ */
function drawKey() {
  // 通用绘制：键位方块
  // args: x, y, label, isOn, onColor
}
function drawKeyHud() {
  if (gameState !== 'playing' && gameState !== 'dead' && gameState !== 'win' && gameState !== 'gameover') return;

  const keyW = 30, keyH = 30, gap = 4;
  const p1Color = '#5bf', p2Color = '#fb5';

  // 屏幕底部居中
  const totalW = (keyW * 3 + gap * 2) + 60 + (keyW * 3 + gap * 2) + 60; // P1 4键 + 分隔 + P2 5键
  const baseX = (CANVAS_W - totalW) / 2;
  const baseY = CANVAS_H - keyH - 6;

  ctx.font = '11px -apple-system';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  let x = baseX;

  // ── P1 标签 ──
  ctx.fillStyle = p1Color;
  ctx.fillText('P1', x + 10, baseY + keyH/2);
  x += 24;

  // A
  drawKeyBox(x, baseY, keyW, keyH, 'A', !!keys['KeyA'], p1Color);
  x += keyW + gap;
  // D
  drawKeyBox(x, baseY, keyW, keyH, 'D', !!keys['KeyD'], p1Color);
  x += keyW + gap;
  // W
  drawKeyBox(x, baseY, keyW, keyH, 'W', !!keys['KeyW'], p1Color);
  x += keyW + gap;
  // 空白位以让 P1/P2 间距更宽
  x += 20;

  // ── P2 标签 ──
  ctx.fillStyle = p2Color;
  ctx.fillText('P2', x + 10, baseY + keyH/2);
  x += 24;

  // ←
  drawKeyBox(x, baseY, keyW, keyH, '←', !!keys['ArrowLeft'], p2Color);
  x += keyW + gap;
  // ↑
  drawKeyBox(x, baseY, keyW, keyH, '↑', !!keys['ArrowUp'], p2Color);
  x += keyW + gap;
  // ↓
  drawKeyBox(x, baseY, keyW, keyH, '↓', !!keys['ArrowDown'], p2Color);
  x += keyW + gap;
  // →
  drawKeyBox(x, baseY, keyW, keyH, '→', !!keys['ArrowRight'], p2Color);
  x += keyW + gap;
  // ESC
  drawKeyBox(x, baseY, keyW * 1.3, keyH, 'ESC', !!keys['Escape'], '#fd0');
}

function drawKeyBox(x, y, w, h, label, isOn, color) {
  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(x+1, y+2, w, h);
  // 底色（按下时高亮）
  if (isOn) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  } else {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x, y, w, 3); // 顶部高光
  }
  // 边框
  ctx.strokeStyle = isOn ? '#fff' : '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  // 文字
  ctx.fillStyle = isOn ? '#000' : '#fff';
  ctx.font = isOn ? 'bold 13px -apple-system' : '12px -apple-system';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2 + 1);
}

/* ============================================
 * 消息
 * ============================================ */
let msgTimeout;
function showMsg(text, autoHide=true) {
  const el = document.getElementById('msg');
  el.innerHTML = text.replace(/\n/g, '<br>');
  el.style.opacity = '1';
  if (autoHide) { clearTimeout(msgTimeout); msgTimeout = setTimeout(() => el.style.opacity = '0', 2000); }
}

/* ============================================
 * 循环
 * ============================================ */
let lastFrame = 0;
function loop(ts) {
  if (ts - lastFrame >= 16) {  // 锁定60fps，高刷屏不加速
    lastFrame = ts;
    try { update(); draw(); }
    catch(e) {
      window._err = e.message;
      console.error('loop err:', e);
      // 不重置 gameState，避免循环里被反复打回 menu
    }
  }
  requestAnimationFrame(loop);  // 始终调用，永不停止
}
requestAnimationFrame(loop);

// 页面加载后尝试启动 BGM（被自动播放策略挡住则等用户首次交互）
playBGM();
// 任意点击/按键时尝试（被自动播放策略挡住时重试）
try {
  ['click','keydown','touchstart','mousedown','pointerdown'].forEach(ev => {
    document.addEventListener(ev, () => playBGM(), {passive:true, once:false});
  });
} catch(e) {}
// audio 加载就绪后自动尝试播放（针对初次加载时机问题）
setTimeout(() => playBGM(), 200);
setTimeout(() => playBGM(), 1000);
setTimeout(() => playBGM(), 3000);
</script>
